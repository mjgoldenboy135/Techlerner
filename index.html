<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Bow &amp; Arrow Fun!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none}
body{overflow:hidden;background:#000}
canvas{display:block}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 18px;pointer-events:none;gap:10px}
@keyframes rainbow{
  0%{color:#FF0000}14%{color:#FF8800}28%{color:#FFE600}
  42%{color:#00FF44}57%{color:#00BBFF}71%{color:#AA00FF}85%{color:#FF00AA}100%{color:#FF0000}
}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
#title{font-family:"Arial Rounded MT Bold","Comic Sans MS",Arial,sans-serif;font-size:34px;
  animation:rainbow 1.4s linear infinite, titleFloat 2s ease-in-out infinite;
  -webkit-text-stroke:2.5px #000;text-shadow:3px 3px 0 rgba(0,0,0,.5);white-space:nowrap}
@keyframes scorePop{0%{transform:scale(1)}30%{transform:scale(1.55)}100%{transform:scale(1)}}
#score{font-family:"Arial Rounded MT Bold","Comic Sans MS",Arial,sans-serif;font-size:38px;
  color:#FFE600;-webkit-text-stroke:2px #000;
  background:linear-gradient(135deg,#6600CC,#AA00FF,#6600CC);
  padding:5px 20px;border-radius:28px;border:3px solid #FFE600;
  box-shadow:0 0 20px #AA00FF,0 0 40px rgba(170,0,255,.4);
  transform-origin:center;transition:none}
#score.pop{animation:scorePop .4s ease-out forwards}
@keyframes comboPop{0%{transform:scale(0.5) translateY(10px);opacity:0}
  40%{transform:scale(1.3) translateY(-5px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
#combo{font-family:"Arial Rounded MT Bold","Comic Sans MS",Arial,sans-serif;
  font-size:28px;color:#FF0;-webkit-text-stroke:2px #000;
  position:absolute;top:70px;left:50%;transform:translateX(-50%);
  text-shadow:0 0 20px #FF0,0 0 40px #FF6600;
  pointer-events:none;opacity:0;transition:opacity .5s}
#combo.show{opacity:1;animation:comboPop .35s ease-out forwards}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="title">🏹 Bow Fun!</div>
  <div id="score">⭐ 0</div>
</div>
<div id="combo"></div>
<script>
// ── Canvas ────────────────────────────────────────────────────────
const C=document.getElementById('c'),ctx=C.getContext('2d');
const scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo');
let W=0,H=0;
function resize(){
  const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;
  C.width=Math.round(W*d);C.height=Math.round(H*d);
  C.style.width=W+'px';C.style.height=H+'px';
  ctx.setTransform(d,0,0,d,0,0);
}
resize();addEventListener('resize',resize);

const GND=()=>H*.68,BOW_X=90;

// ── State ─────────────────────────────────────────────────────────
let score=0,mx=W*.65,my=H*.45,pulling=false,pullPct=0;
let animals=[],arrows=[],particles=[],shockwaves=[],bgStars=[];
let popTexts=[],lastSpawn=0,spawnDelay=2000,gameT=0,sunA=0;
let shakeAmt=0,flashA=0,combo=0,comboTimer=0,lastSfxT=0;
let cloudX=[100,420,760,1100,1400];

// Init background stars
function initStars(){
  bgStars=Array.from({length:55},()=>({
    x:Math.random()*W,y:Math.random()*H*.65,
    vy:-.35-Math.random()*.7,sz:.8+Math.random()*2.8,
    hue:Math.random()*360,twinkle:Math.random()*Math.PI*2,alpha:.3+Math.random()*.5
  }));
}
initStars();

// Glow colors per animal
const GLOW={bunny:'#FF00BB',duck:'#FFE600',cat:'#FF5500',chicken:'#FF0000',bear:'#FF9900'};

// ── Audio ─────────────────────────────────────────────────────────
let AC;
function ac(){return AC=AC||new(window.AudioContext||window.webkitAudioContext)()}
function voice(type,hit){
  try{
    const a=ac(),t=a.currentTime,v=hit?.34:.18;
    if(type==='bunny'){
      const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
      o.type='sine';o.frequency.setValueAtTime(hit?1500:920,t);
      o.frequency.linearRampToValueAtTime(hit?550:1200,t+.09);o.frequency.linearRampToValueAtTime(hit?340:760,t+.2);
      g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);o.start();o.stop(t+.24);
    }else if(type==='duck'){
      [0,.14].forEach(dt=>{
        const o=a.createOscillator(),g=a.createGain(),f=a.createBiquadFilter();
        o.connect(f);f.connect(g);g.connect(a.destination);
        o.type='sawtooth';f.type='bandpass';f.frequency.value=700;f.Q.value=3;
        o.frequency.setValueAtTime(hit?300:220,t+dt);o.frequency.exponentialRampToValueAtTime(hit?130:390,t+dt+.06);o.frequency.exponentialRampToValueAtTime(hit?90:165,t+dt+.14);
        g.gain.setValueAtTime(v+.08,t+dt);g.gain.exponentialRampToValueAtTime(.001,t+dt+.16);o.start(t+dt);o.stop(t+dt+.18);
      });
    }else if(type==='cat'){
      const o=a.createOscillator(),vib=a.createOscillator(),vg=a.createGain(),g=a.createGain(),f=a.createBiquadFilter();
      vib.connect(vg);vg.connect(o.frequency);o.connect(f);f.connect(g);g.connect(a.destination);
      o.type='sawtooth';f.type='lowpass';f.frequency.value=1600;vib.type='sine';vib.frequency.value=7;vg.gain.value=35;
      o.frequency.setValueAtTime(hit?680:310,t);o.frequency.linearRampToValueAtTime(hit?1050:730,t+.16);o.frequency.exponentialRampToValueAtTime(hit?170:250,t+.55);
      g.gain.setValueAtTime(.01,t);g.gain.linearRampToValueAtTime(v+.06,t+.06);g.gain.exponentialRampToValueAtTime(.001,t+.62);
      vib.start();vib.stop(t+.62);o.start();o.stop(t+.65);
    }else if(type==='chicken'){
      (hit?[0,.055,.11,.165]:[0,.07,.14]).forEach((dt,i)=>{
        const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);
        o.type='square';o.frequency.setValueAtTime(500-i*45,t+dt);o.frequency.exponentialRampToValueAtTime(195,t+dt+.05);
        g.gain.setValueAtTime(v,t+dt);g.gain.exponentialRampToValueAtTime(.001,t+dt+.06);o.start(t+dt);o.stop(t+dt+.08);
      });
    }else if(type==='bear'){
      const o=a.createOscillator(),g=a.createGain(),f=a.createBiquadFilter();
      o.connect(f);f.connect(g);g.connect(a.destination);
      o.type='sawtooth';f.type='lowpass';f.frequency.value=300;f.Q.value=.8;
      o.frequency.setValueAtTime(hit?155:78,t);o.frequency.linearRampToValueAtTime(hit?230:132,t+.14);o.frequency.exponentialRampToValueAtTime(hit?52:60,t+.5);
      g.gain.setValueAtTime(v+.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.54);o.start();o.stop(t+.58);
    }
  }catch(e){}
}
function maybeVoice(type){const n=performance.now();if(n-lastSfxT<1100)return;lastSfxT=n;voice(type,false)}
function shootSfx(){try{const a=ac(),t=a.currentTime,o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sawtooth';o.frequency.setValueAtTime(340,t);o.frequency.exponentialRampToValueAtTime(120,t+.1);g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start();o.stop(t+.14)}catch(e){}}

// ── Draw helpers ──────────────────────────────────────────────────
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function K(w=4){ctx.strokeStyle='#000';ctx.lineWidth=w;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke()}
function star5(x,y,r,c){ctx.fillStyle=c;ctx.beginPath();for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2-Math.PI/2,b=a+Math.PI/5;i?ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);ctx.lineTo(x+Math.cos(b)*r*.42,y+Math.sin(b)*r*.42)}ctx.closePath();ctx.fill()}
function radGrad(x,y,r0,r1,c0,c1){const g=ctx.createRadialGradient(x,y,r0,x,y,r1);g.addColorStop(0,c0);g.addColorStop(1,c1);return g}

// ══════════════════════════════════════════════════════════════════
// ANIMAL DRAW FUNCTIONS  — all coords ×2 vs previous for visibility
// ══════════════════════════════════════════════════════════════════

function drawBunny(s,step){
  const air=Math.sin(step*2.8)>0,lean=air?.25:0;
  // ears
  [[-13,.-.12],[13,.12]].forEach(([ex,sgn])=>{
    ctx.save();ctx.rotate(lean*sgn);
    ctx.fillStyle=radGrad(ex*s,-52*s,2*s,8*s,'#FFF5F5','#FFCCEE');
    ctx.beginPath();ctx.ellipse(ex*s,-52*s,8*s,26*s,ex*.012,0,Math.PI*2);ctx.fill();K(3);
    ctx.fillStyle='#FF00AA';ctx.beginPath();ctx.ellipse(ex*s,-52*s,4.5*s,19*s,ex*.012,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // tail
  ctx.fillStyle='#FFFFFF';ctx.shadowColor='#FFB0E0';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(30*s,18*s,13*s,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;K(3);
  // body
  ctx.fillStyle=radGrad(0,12*s,6*s,30*s,'#FFFFFF','#EEDDEE');
  ctx.beginPath();ctx.ellipse(0,12*s,28*s,24*s,0,0,Math.PI*2);ctx.fill();K(4);
  // belly tint
  ctx.fillStyle='rgba(255,200,230,.35)';ctx.beginPath();ctx.ellipse(0,14*s,14*s,13*s,0,0,Math.PI*2);ctx.fill();
  // back legs kick
  const bk=air?.95:.48;
  ctx.fillStyle='#F5F5F5';
  ctx.beginPath();ctx.ellipse(-12*s,42*s,9*s,17*s,bk-.12,0,Math.PI*2);ctx.fill();K(3);
  ctx.beginPath();ctx.ellipse(12*s,42*s,9*s,17*s,-bk+.12,0,Math.PI*2);ctx.fill();K(3);
  // head
  ctx.fillStyle=radGrad(0,-15*s,5*s,26*s,'#FFFFFF','#F0EEF0');
  ctx.beginPath();ctx.ellipse(0,-16*s,24*s,22*s,0,0,Math.PI*2);ctx.fill();K(4);
  // EYES — big & expressive
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-9*s,-18*s,6*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(9*s,-18*s,6*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-7*s,-20*s,2.4*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(11*s,-20*s,2.4*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(100,200,255,.5)';ctx.beginPath();ctx.arc(-9*s,-18*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(9*s,-18*s,3*s,0,Math.PI*2);ctx.fill();
  // cheeks
  ctx.fillStyle='rgba(255,0,140,.36)';
  ctx.beginPath();ctx.ellipse(-15*s,-10*s,9*s,5.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(15*s,-10*s,9*s,5.5*s,0,0,Math.PI*2);ctx.fill();
  // nose
  ctx.fillStyle='#FF00AA';ctx.beginPath();ctx.arc(0,-8*s,5.5*s,0,Math.PI*2);ctx.fill();K(2.5,'#CC0088');
  // smile
  ctx.strokeStyle='#AA88AA';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,-3*s,6*s,.18,Math.PI-.18);ctx.stroke();
  // front paws
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();ctx.ellipse(-12*s,32*s,7*s,11*s,.35,0,Math.PI*2);ctx.fill();K(3);
  ctx.beginPath();ctx.ellipse(12*s,32*s,7*s,11*s,-.35,0,Math.PI*2);ctx.fill();K(3);
}

function drawDuck(s,step){
  const wa=Math.sin(step*4.8)*.78;
  // upper wing
  ctx.fillStyle=radGrad(0,-18*s,3*s,22*s,'#FFEE44','#FF9900');
  ctx.save();ctx.rotate(-wa-.12);ctx.beginPath();ctx.ellipse(0,-18*s,30*s,11*s,-.28,0,Math.PI*2);ctx.fill();K(3.5);ctx.restore();
  // body
  ctx.fillStyle=radGrad(-4*s,8*s,5*s,35*s,'#FFF599','#FFE000');
  ctx.beginPath();ctx.ellipse(0,12*s,36*s,24*s,.08,0,Math.PI*2);ctx.fill();K(4);
  ctx.fillStyle='rgba(255,255,200,.5)';ctx.beginPath();ctx.ellipse(-3*s,9*s,18*s,14*s,0,0,Math.PI*2);ctx.fill();
  // lower wing
  ctx.fillStyle=radGrad(0,8*s,3*s,22*s,'#FFD000','#FFAA00');
  ctx.save();ctx.rotate(wa+.18);ctx.beginPath();ctx.ellipse(-1*s,10*s,27*s,10*s,.22,0,Math.PI*2);ctx.fill();K(3);ctx.restore();
  // tail
  ctx.fillStyle='#FF9900';ctx.beginPath();ctx.moveTo(-32*s,11*s);ctx.lineTo(-46*s,2*s);ctx.lineTo(-30*s,22*s);ctx.fill();K(3);
  // head
  ctx.fillStyle=radGrad(-3*s,-24*s,4*s,22*s,'#FFFAAA','#FFE200');
  ctx.beginPath();ctx.arc(0,-24*s,22*s,0,Math.PI*2);ctx.fill();K(4);
  ctx.fillStyle='rgba(255,255,180,.4)';ctx.beginPath();ctx.arc(-4*s,-26*s,9*s,0,Math.PI*2);ctx.fill();
  // bill
  ctx.fillStyle=radGrad(26*s,-24*s,3*s,16*s,'#FFCC44','#FF6600');
  ctx.beginPath();ctx.ellipse(26*s,-24*s,17*s,9*s,0,0,Math.PI*2);ctx.fill();K(3.5);
  ctx.fillStyle='#AA3300';ctx.beginPath();ctx.arc(20*s,-26*s,2.5*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(30*s,-26*s,2.5*s,0,Math.PI*2);ctx.fill();
  // eye
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(8*s,-30*s,6.5*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(10*s,-32*s,2.5*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(100,200,255,.5)';ctx.beginPath();ctx.arc(8*s,-30*s,3.5*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,120,0,.3)';ctx.beginPath();ctx.ellipse(12*s,-19*s,9*s,5.5*s,0,0,Math.PI*2);ctx.fill();
  // feet dangle
  ctx.strokeStyle='#FF6600';ctx.lineWidth=5*s;ctx.lineCap='round';
  [[-9,34],[9,34]].forEach(([fx,fy])=>{
    ctx.beginPath();ctx.moveTo(fx*s,fy*s);ctx.lineTo(fx*s,(fy+16)*s);ctx.stroke();
    ctx.lineWidth=3.5*s;
    [[-9,7],[0,10],[9,7]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(fx*s,(fy+16)*s);ctx.lineTo((fx+dx)*s,(fy+16+dy)*s);ctx.stroke()});
    ctx.lineWidth=5*s;
  });
}

function drawCat(s,step){
  const lg=Math.sin(step),bob=Math.sin(step*2)*3,ts=Math.sin(step*.55)*.45;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,(62+bob)*s,36*s,8*s,0,0,Math.PI*2);ctx.fill();
  // tail
  ctx.strokeStyle='#FF5500';ctx.lineWidth=9*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(36*s,(16+bob)*s);ctx.bezierCurveTo(65*s+ts*32*s,(bob)*s,72*s+ts*25*s,(-26+bob)*s,52*s,(-42+bob)*s);ctx.stroke();K(3.5);
  // back legs
  ctx.fillStyle=radGrad(0,0,2,10,'#FF8833','#FF6B00');
  ctx.save();ctx.translate(-14*s,(50+bob)*s);ctx.rotate(-lg*.32);rrect(-7*s,0,14*s,26*s,5*s);ctx.fill();K(3.5);ctx.restore();
  ctx.save();ctx.translate(14*s,(50+bob)*s);ctx.rotate(lg*.32);rrect(-7*s,0,14*s,26*s,5*s);ctx.fill();K(3.5);ctx.restore();
  // body
  ctx.fillStyle=radGrad(0,(10+bob)*s,8*s,32*s,'#FF8833','#FF5500');
  ctx.beginPath();ctx.ellipse(0,(18+bob)*s,30*s,25*s,0,0,Math.PI*2);ctx.fill();K(5);
  ctx.fillStyle='rgba(255,180,80,.3)';ctx.beginPath();ctx.ellipse(0,(18+bob)*s,16*s,14*s,0,0,Math.PI*2);ctx.fill();
  // stripes
  ctx.strokeStyle='#CC2200';ctx.lineWidth=3.5*s;
  [-12,0,12].forEach(x=>{ctx.beginPath();ctx.moveTo(x*s,(-2+bob)*s);ctx.lineTo((x+2)*s,(40+bob)*s);ctx.stroke()});
  // head
  ctx.fillStyle=radGrad(0,(-22+bob)*s,6*s,30*s,'#FF9944','#FF6B00');
  ctx.beginPath();ctx.arc(0,(-22+bob)*s,28*s,0,Math.PI*2);ctx.fill();K(5);
  // ears
  [[-24,-40,-14,-64,-2,-40],[24,-40,14,-64,2,-40]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.fillStyle='#FF6B00';ctx.beginPath();
    ctx.moveTo(x1*s,(y1+bob)*s);ctx.lineTo(x2*s,(y2+bob)*s);ctx.lineTo(x3*s,(y3+bob)*s);ctx.fill();K(3.5);
    ctx.fillStyle='#FF00AA';ctx.beginPath();
    ctx.moveTo(x1*.8*s,((y1+2)+bob)*s);ctx.lineTo(x2*s,(y2*.88+bob)*s);ctx.lineTo(x3*.8*s,((y3+2)+bob)*s);ctx.fill();
  });
  // front legs opposite
  ctx.fillStyle=radGrad(0,0,2,10,'#FF8833','#FF6B00');
  ctx.save();ctx.translate(-14*s,(36+bob)*s);ctx.rotate(lg*.32);rrect(-7*s,0,14*s,24*s,5*s);ctx.fill();K(3.5);ctx.restore();
  ctx.save();ctx.translate(14*s,(36+bob)*s);ctx.rotate(-lg*.32);rrect(-7*s,0,14*s,24*s,5*s);ctx.fill();K(3.5);ctx.restore();
  // paws
  ctx.fillStyle='#FFAA44';
  ctx.beginPath();ctx.ellipse(-14*s,(58+bob)*s,12*s,7*s,0,0,Math.PI*2);ctx.fill();K(3);
  ctx.beginPath();ctx.ellipse(14*s,(58+bob)*s,12*s,7*s,0,0,Math.PI*2);ctx.fill();K(3);
  // vivid green eyes
  ctx.fillStyle='#00EE00';
  ctx.beginPath();ctx.ellipse(-10*s,(-24+bob)*s,8.5*s,10.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10*s,(-24+bob)*s,8.5*s,10.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(-10*s,(-24+bob)*s,3.2*s,8.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10*s,(-24+bob)*s,3.2*s,8.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-8*s,(-27+bob)*s,2.2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(12*s,(-27+bob)*s,2.2*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(100,255,100,.45)';
  ctx.beginPath();ctx.ellipse(-10*s,(-24+bob)*s,4*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10*s,(-24+bob)*s,4*s,5*s,0,0,Math.PI*2);ctx.fill();
  // nose + whiskers
  ctx.fillStyle='#FF1493';ctx.beginPath();ctx.moveTo(-5*s,(-12+bob)*s);ctx.lineTo(5*s,(-12+bob)*s);ctx.lineTo(0,(-7+bob)*s);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.8;
  [[-5,-11,-36,-16],[-5,-11,-36,-11],[5,-11,36,-16],[5,-11,36,-11]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*s,(y1+bob)*s);ctx.lineTo(x2*s,(y2+bob)*s);ctx.stroke()});
  ctx.fillStyle='rgba(255,30,0,.25)';
  ctx.beginPath();ctx.ellipse(-18*s,(-14+bob)*s,11*s,6*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(18*s,(-14+bob)*s,11*s,6*s,0,0,Math.PI*2);ctx.fill();
}

function drawChicken(s,step){
  const wa=Math.sin(step*4.0)*.7;
  // upper wing
  ctx.fillStyle=radGrad(0,-8*s,4*s,26*s,'#F5F5D0','#CCCC88');
  ctx.save();ctx.rotate(-wa-.14);ctx.beginPath();ctx.ellipse(0,-8*s,28*s,11*s,-.18,0,Math.PI*2);ctx.fill();K(3.5);ctx.restore();
  // body
  ctx.fillStyle=radGrad(-2*s,12*s,6*s,30*s,'#FFFFF5','#EEEECC');
  ctx.beginPath();ctx.ellipse(0,12*s,28*s,24*s,0,0,Math.PI*2);ctx.fill();K(5);
  ctx.fillStyle='rgba(255,255,220,.4)';ctx.beginPath();ctx.ellipse(-2*s,10*s,13*s,13*s,0,0,Math.PI*2);ctx.fill();
  // lower wing
  ctx.fillStyle=radGrad(0,16*s,3*s,22*s,'#DDDDAA','#BBBB88');

const DRAW={bunny:drawBunny,duck:drawDuck,cat:drawCat,chicken:drawChicken,bear:drawBear};

// ── Bow ─────────────────────────────────────────────────────────
function drawBow(x,y,ang,pull){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang);
  const R=50,arc=Math.PI/2.1;
  // glow when pulled
  if(pull>.3){ctx.shadowColor='#FFE600';ctx.shadowBlur=20*pull}
  ctx.strokeStyle='#7B4010';ctx.lineWidth=10;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,0,R,-arc,arc);ctx.stroke();ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(180,90,20,.25)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,0,R-4,-arc+.08,arc-.08);ctx.stroke();
  const tx=R*Math.cos(-arc),ty=R*Math.sin(-arc),bx=R*Math.cos(arc),by=R*Math.sin(arc),px=-16*pull;
  ctx.strokeStyle='#FFE060';ctx.lineWidth=3;ctx.lineCap='butt';
  ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(px,0);ctx.lineTo(bx,by);ctx.stroke();
  if(pull>.06){
    ctx.strokeStyle='#CC6600';ctx.lineWidth=4.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(R+18,0);ctx.stroke();
    ctx.fillStyle='#CCCCCC';ctx.strokeStyle='#666';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(R+25,0);ctx.lineTo(R+12,-7);ctx.lineTo(R+12,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#FF2200';
    ctx.beginPath();ctx.moveTo(px+4,0);ctx.lineTo(px-12,-9);ctx.lineTo(px-5,0);ctx.fill();
    ctx.beginPath();ctx.moveTo(px+4,0);ctx.lineTo(px-12,9);ctx.lineTo(px-5,0);ctx.fill();
  }
  ctx.restore();
}

// ── Background ──────────────────────────────────────────────────
let cloudX=[100,420,760,1100,1420];
function drawBG(ts){
  const gnd=GND();
  // animated sky hue
  const hShift=Math.sin(ts*.00015)*20;
  const sk=ctx.createLinearGradient(0,0,0,gnd);
  sk.addColorStop(0,`hsl(${225+hShift},88%,22%)`);
  sk.addColorStop(.5,`hsl(${210+hShift},100%,42%)`);
  sk.addColorStop(1,`hsl(${195+hShift},100%,62%)`);
  ctx.fillStyle=sk;ctx.fillRect(0,0,W,gnd);
  // ground
  const gg=ctx.createLinearGradient(0,gnd,0,H);
  gg.addColorStop(0,'#55FF44');gg.addColorStop(.4,'#22CC33');gg.addColorStop(1,'#116622');
  ctx.fillStyle=gg;ctx.fillRect(0,gnd,W,H-gnd);
  // neon ground line
  ctx.strokeStyle='#AAFF00';ctx.lineWidth=4;
  ctx.shadowColor='#AAFF00';ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(0,gnd);ctx.lineTo(W,gnd);ctx.stroke();
  ctx.shadowBlur=0;
  // sun
  sunA+=.005;const sx=W-95,sy=80;
  const gl=ctx.createRadialGradient(sx,sy,18,sx,sy,100);
  gl.addColorStop(0,'rgba(255,240,0,.6)');gl.addColorStop(1,'rgba(255,100,0,0)');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(sx,sy,100,0,Math.PI*2);ctx.fill();
  for(let i=0;i<16;i++){
    const a=sunA+(i/16)*Math.PI*2,h=(i/16)*360;
    ctx.strokeStyle=`hsl(${h},100%,60%)`;ctx.lineWidth=4;ctx.lineCap='round';
    ctx.shadowColor=`hsl(${h},100%,60%)`;ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(sx+Math.cos(a)*52,sy+Math.sin(a)*52);ctx.lineTo(sx+Math.cos(a)*76,sy+Math.sin(a)*76);ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.fillStyle='#FFE000';ctx.beginPath();ctx.arc(sx,sy,42,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#FF8800';ctx.lineWidth=4;ctx.stroke();
  ctx.fillStyle='#FFF44F';ctx.beginPath();ctx.arc(sx-9,sy-9,14,0,Math.PI*2);ctx.fill();
  // clouds
  cloudX=cloudX.map((cx,i)=>{const n=cx+.16+i*.05;return n>W+280?-240:n});
  cloudX.forEach((cx,i)=>drawCloud(cx,[50,34,78,56,90][i],[1,1.2,.7,.85,1.1][i]));
  // flowers
  for(let fx=100;fx<W-20;fx+=55)drawFlower(fx,gnd);
  // grass
  ctx.strokeStyle='#88FF66';ctx.lineWidth=2.2;
  for(let fx=75;fx<W-15;fx+=26){
    ctx.beginPath();ctx.moveTo(fx,gnd);ctx.lineTo(fx-4,gnd-14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx+5,gnd);ctx.lineTo(fx+2,gnd-17);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx+11,gnd);ctx.lineTo(fx+15,gnd-13);ctx.stroke();
  }
}

function drawCloud(x,y,sc){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  // soft shadow
  ctx.fillStyle='rgba(80,120,255,.15)';
  ctx.beginPath();ctx.arc(4,5,30,0,Math.PI*2);ctx.arc(38,1,37,0,Math.PI*2);ctx.arc(78,5,27,0,Math.PI*2);
  ctx.arc(90,17,21,0,Math.PI*2);ctx.arc(52,20,31,0,Math.PI*2);ctx.arc(14,18,23,0,Math.PI*2);ctx.fill();
  // white body
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);ctx.arc(34,-10,37,0,Math.PI*2);ctx.arc(74,0,27,0,Math.PI*2);
  ctx.arc(86,12,21,0,Math.PI*2);ctx.arc(48,15,31,0,Math.PI*2);ctx.arc(10,13,23,0,Math.PI*2);ctx.fill();
  // subtle rainbow tint
  ctx.fillStyle='rgba(200,180,255,.18)';

}

const PCOLS=['#FF0066','#FF4400','#9900FF','#FFE600','#FF0000','#00CCFF','#FF00AA'];
function drawFlower(x,y){
  const c=PCOLS[Math.floor(x/55)%PCOLS.length];
  ctx.strokeStyle='#22AA33';ctx.lineWidth=2.2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+20);ctx.stroke();
  ctx.fillStyle='#44BB33';ctx.beginPath();ctx.moveTo(x,y+10);ctx.quadraticCurveTo(x+12,y+5,x+10,y+17);ctx.quadraticCurveTo(x,y+17,x,y+10);ctx.fill();
  ctx.shadowColor=c;ctx.shadowBlur=6;ctx.fillStyle=c;
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.ellipse(x+Math.cos(a)*8,y+Math.sin(a)*8,5,8,a,0,Math.PI*2);ctx.fill()}
  ctx.shadowBlur=0;ctx.fillStyle='#FFE600';ctx.beginPath();ctx.arc(x,y,5.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#CC8800';ctx.lineWidth=1.5;ctx.stroke();
}

// ── Background stars ─────────────────────────────────────────────
function drawBgStars(ts){
  bgStars.forEach(sp=>{
    sp.y+=sp.vy;sp.twinkle+=.05;
    if(sp.y<-5){sp.y=GND()+5;sp.x=Math.random()*W}
    const al=(sp.alpha+Math.sin(sp.twinkle)*.22)*(.88+Math.sin(ts*.001+sp.twinkle)*.12);
    ctx.globalAlpha=Math.max(0,al);
    ctx.fillStyle=`hsl(${sp.hue},100%,72%)`;
    ctx.shadowColor=`hsl(${sp.hue},100%,72%)`;ctx.shadowBlur=sp.sz*3;
    ctx.beginPath();ctx.arc(sp.x,sp.y,sp.sz,0,Math.PI*2);ctx.fill();
    sp.hue=(sp.hue+.5)%360;
  });
  ctx.shadowBlur=0;ctx.globalAlpha=1;
}

// ── Spawn ────────────────────────────────────────────────────────
function spawnAnimal(){
  const type=TYPES[Math.floor(Math.random()*TYPES.length)];
  const mt=MTYPE[type],gnd=GND();
  const baseY=mt==='fly'?gnd-100-Math.random()*(H*.3):gnd-4;
  animals.push({
    type,x:W+90,baseY,currY:baseY,targetY:baseY,
    sc:.45+Math.random()*.18, // 45–63% — clear, not tiny
    speed:(1.8+Math.random()*2.2)*(W/1100),
    step:Math.random()*Math.PI*2,
    moveType:mt,
    bhv:mt==='fly'?'glide':mt==='hop'?'hop':'walk',
    bhvTimer:80+Math.random()*120,
    soundTimer:100+Math.random()*200,
    trailTimer:0
  });
  setTimeout(()=>maybeVoice(type),900+Math.random()*600);
}

function updateBhv(a){
  a.bhvTimer--;if(a.bhvTimer>0)return;
  const r=Math.random(),mt=a.moveType,gnd=GND();
  if(mt==='walk'){
    if(r<.13){a.bhv='dash';a.bhvTimer=40+Math.random()*28}
    else if(r<.24){a.bhv='stop';a.bhvTimer=22+Math.random()*22}
    else{a.bhv='walk';a.bhvTimer=90+Math.random()*110}
  }else if(mt==='hop'){
    if(r<.16){a.bhv='superhop';a.bhvTimer=30}
    else if(r<.28){a.bhv='dash';a.bhvTimer=38}
    else{a.bhv='hop';a.bhvTimer=75+Math.random()*90}
  }else{
    if(r<.18){a.bhv='dive';a.targetY=Math.min(gnd-40,a.baseY+120);a.bhvTimer=55}
    else if(r<.34){a.bhv='climb';a.targetY=Math.max(55,a.baseY-100);a.bhvTimer=55}
    else if(r<.52){a.bhv='zigzag';a.bhvTimer=90}
    else if(r<.60){a.bhv='dash';a.bhvTimer=34}
    else{a.bhv='glide';a.targetY=a.baseY;a.bhvTimer=80+Math.random()*80}
  }
}

// ── Game loop ────────────────────────────────────────────────────
function loop(ts){
  if(!gameT)gameT=ts;
  const elapsed=ts-gameT,gnd=GND(),bowY=gnd;
  ctx.clearRect(0,0,W,H);

  ctx.save();
  // Screen shake
  if(shakeAmt>.5){ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);shakeAmt*=.78}

  drawBG(ts);
  drawBgStars(ts);

  // Spawn
  spawnDelay=Math.max(900,2000-elapsed*.055);
  if(ts-lastSpawn>spawnDelay){spawnAnimal();if(elapsed>12000)spawnAnimal();lastSpawn=ts}

  // ── Animals ──────────────────────────────────────────────────
  animals=animals.filter(a=>{
    updateBhv(a);
    const sm={dash:2.6,stop:.08,walk:1,glide:.95,dive:1.2,climb:1.15,zigzag:1.05,hop:1,superhop:.8}[a.bhv]||1;
    a.x-=a.speed*sm;a.step+=a.speed*sm*.08+.04;
    if(a.x<-140)return false;

    // ambient voice
    a.soundTimer--;if(a.soundTimer<=0){maybeVoice(a.type);a.soundTimer=200+Math.random()*260}

    // current draw Y
    let dy=a.baseY;
    if(a.moveType==='hop'){
      const hh=a.bhv==='superhop'?60:30;
      dy=a.baseY-Math.abs(Math.sin(a.step*2.8))*hh*a.sc;
    }else if(a.moveType==='fly'){
      if(a.bhv==='zigzag'&&Math.sin(a.step*3)>.92){
        const gn=GND();a.targetY=Math.max(55,Math.min(gn-40,a.baseY+(Math.random()-.5)*180));
      }
      a.currY+=(a.targetY-a.currY)*.045;
      dy=a.currY+Math.sin(a.step*.5)*15;
    }

    // ground shadow for hop/fly
    if(a.moveType!=='walk'){
      const dist=Math.abs(dy-gnd),al=Math.max(.03,.3-dist/140);
      ctx.globalAlpha=al;ctx.fillStyle='rgba(0,0,0,.55)';
      ctx.beginPath();ctx.ellipse(a.x,gnd,20*a.sc,4.5*a.sc,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }

    // sparkle trail
    a.trailTimer++;
    if(a.trailTimer%3===0&&Math.random()<.65){
      particles.push({
        x:a.x+(Math.random()-.5)*30*a.sc,y:dy+(Math.random()-.5)*30*a.sc,
        vx:(Math.random()-.5)*2,vy:-1.2-Math.random()*1.5,
        life:.6+Math.random()*.3,col:GLOW[a.type],sz:2.5+Math.random()*5,type:'dot',g:.02
      });
    }

    // GLOW AURA behind animal
    ctx.save();ctx.translate(a.x,dy);
    ctx.fillStyle=GLOW[a.type];ctx.globalAlpha=.35;
    ctx.shadowColor=GLOW[a.type];ctx.shadowBlur=45;
    ctx.beginPath();ctx.ellipse(0,6*a.sc,30*a.sc,30*a.sc,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();

    // Draw animal
    ctx.save();ctx.translate(a.x,dy);ctx.scale(-1,1);
    DRAW[a.type](a.sc,a.step);
    ctx.restore();
    return true;
  });

  // ── Shockwaves ────────────────────────────────────────────────
  shockwaves=shockwaves.filter(sw=>{
    sw.r+=(sw.maxR-sw.r)*.14;sw.life-=.055;if(sw.life<=0)return false;
    ctx.globalAlpha=sw.life*.8;
    ctx.strokeStyle=PCLR[Math.floor(sw.life*8)%8];ctx.lineWidth=4+sw.life*4;
    ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;return true;
  });

  // ── Arrows ───────────────────────────────────────────────────
  arrows=arrows.filter(ar=>{
    ar.x+=ar.vx;ar.y+=ar.vy;ar.vy+=.22;ar.angle=Math.atan2(ar.vy,ar.vx);
    if(ar.x<-80||ar.x>W+80||ar.y>H+80)return false;
    for(let i=animals.length-1;i>=0;i--){
      const a=animals[i];
      let ay=a.baseY;
      if(a.moveType==='hop')ay=a.baseY-Math.abs(Math.sin(a.step*2.8))*(a.bhv==='superhop'?60:30)*a.sc;
      else if(a.moveType==='fly')ay=a.currY+Math.sin(a.step*.5)*15;
      if(Math.hypot(ar.x-a.x,ar.y-ay)<44*a.sc){
        burst(a.x,ay,a.sc);popText(a.x,ay-60*a.sc);
        voice(a.type,true);shakeAmt=10;flashA=.55;
        combo++;comboTimer=130;
        if(combo>1){
          comboEl.textContent=`🔥 COMBO x${combo}!`;
          comboEl.className='';void comboEl.offsetWidth;comboEl.className='show';
        }
        animals.splice(i,1);score++;scoreEl.textContent='⭐ '+score;
        scoreEl.className='';void scoreEl.offsetWidth;scoreEl.className='pop';
        return false;
      }
    }
    drawArrow(ar.x,ar.y,ar.angle);return true;
  });

  // combo timer
  if(comboTimer>0){comboTimer--;if(comboTimer===0){combo=0;comboEl.style.opacity=0}}

  // ── Particles ─────────────────────────────────────────────────
  particles=particles.filter(p=>{
    p.life-=.018;p.x+=p.vx;p.y+=p.vy;p.vy+=p.g||.1;p.vx*=.97;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life;
    if(p.isText){
      ctx.font=`bold ${p.sz}px Arial`;ctx.textAlign='center';
      ctx.fillStyle='#FFE600';ctx.strokeStyle='#000';ctx.lineWidth=4.5;
      ctx.strokeText(p.text,p.x,p.y);ctx.fillText(p.text,p.x,p.y);
    }else if(p.type==='star'){
      ctx.shadowColor=p.col;ctx.shadowBlur=8;star5(p.x,p.y,p.sz,p.col);ctx.shadowBlur=0;
    }else{
      ctx.shadowColor=p.col;ctx.shadowBlur=6;
      ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;return true;
  });

  // ── Pop texts ─────────────────────────────────────────────────
  popTexts=popTexts.filter(t=>{
    t.y+=t.vy;t.life-=.022;t.vy*=.94;if(t.life<=0)return false;
    ctx.globalAlpha=t.life;
    ctx.font=`bold ${t.sz}px "Arial Rounded MT Bold",Arial`;ctx.textAlign='center';
    t.hue=(t.hue+4)%360;
    ctx.fillStyle=`hsl(${t.hue},100%,50%)`;ctx.strokeStyle='#fff';ctx.lineWidth=8;
    ctx.shadowColor=`hsl(${t.hue},100%,50%)`;ctx.shadowBlur=15;
    ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y);
    ctx.shadowBlur=0;ctx.globalAlpha=1;return true;
  });

  // ── Aim guide ─────────────────────────────────────────────────
  if(animals.length>0){
    const aimHue=(ts/8)%360;
    ctx.globalAlpha=.22;ctx.strokeStyle=`hsl(${aimHue},100%,60%)`;ctx.lineWidth=2.8;ctx.setLineDash([12,9]);
    ctx.beginPath();ctx.moveTo(BOW_X,bowY);ctx.lineTo(mx,my);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    ctx.globalAlpha=.55;ctx.strokeStyle='#fff';ctx.lineWidth=2.8;ctx.beginPath();ctx.arc(mx,my,17,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=.9;ctx.fillStyle='#FF0000';ctx.shadowColor='#FF0000';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  // ── Flash overlay ─────────────────────────────────────────────
  if(flashA>.01){
    ctx.fillStyle=`rgba(255,255,255,${flashA})`;ctx.fillRect(0,0,W,H);flashA*=.7;
  }

  ctx.restore(); // end shake transform

  // ── Bow + kid ─────────────────────────────────────────────────
  if(pulling&&pullPct<1)pullPct=Math.min(1,pullPct+.065);
  const ang=Math.atan2(my-bowY,mx-BOW_X);
  drawKid(BOW_X,bowY);
  drawBow(BOW_X,bowY,ang,pulling?pullPct:.18);

  requestAnimationFrame(loop);
}

// ── Input ────────────────────────────────────────────────────────
function aim(x,y){mx=x;my=y}
function shoot(){
  const ang=Math.atan2(my-GND(),mx-BOW_X);
  arrows.push({x:BOW_X,y:GND(),vx:Math.cos(ang)*15.5,vy:Math.sin(ang)*15.5,angle:ang});
  shootSfx();pulling=false;pullPct=0;
}
C.addEventListener('mousemove',e=>{const r=C.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top)});
C.addEventListener('mousedown',e=>{const r=C.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top);pulling=true;pullPct=0});
C.addEventListener('mouseup',()=>{if(pulling)shoot()});
C.addEventListener('touchmove',e=>{e.preventDefault();const r=C.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:false});
C.addEventListener('touchstart',e=>{e.preventDefault();const r=C.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);pulling=true;pullPct=0},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(pulling)shoot()},{passive:false});
requestAnimationFrame(loop);
</script>
</body>
