<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bow &amp; Arrow Fun!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { overflow:hidden; background:#4FC3F7; }
canvas { display:block; }
#hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 22px; pointer-events:none;
}
#title {
  font-family:'Arial Rounded MT Bold','Comic Sans MS',Arial,sans-serif;
  font-size:38px; color:#FFD700;
  text-shadow:3px 3px 0 #FF6B00, 5px 5px 6px rgba(0,0,0,0.35);
}
#score {
  font-family:'Arial Rounded MT Bold','Comic Sans MS',Arial,sans-serif;
  font-size:44px; color:#fff;
  text-shadow:3px 3px 0 #333;
  background:rgba(255,255,255,0.28);
  padding:4px 22px; border-radius:30px;
  border:3px solid rgba(255,255,255,0.45);
}
#hint {
  position:absolute; bottom:22px; left:50%;
  transform:translateX(-50%);
  font-family:'Arial Rounded MT Bold','Comic Sans MS',Arial,sans-serif;
  font-size:24px; color:rgba(255,255,255,0.85);
  text-shadow:2px 2px 4px rgba(0,0,0,0.4);
  pointer-events:none; transition:opacity 1s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="title">🏹 Bow Fun!</div>
  <div id="score">⭐ 0</div>
</div>
<div id="hint">Aim with your finger — hold &amp; release to shoot!</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hintEl = document.getElementById('hint');

// ── resize ──────────────────────────────────────────────
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

// ── state ───────────────────────────────────────────────
let score = 0, hintShown = false;
let mx = innerWidth * 0.65, my = innerHeight * 0.45;
let pulling = false, pullPct = 0;
const BOW_X = 115;
const GND = () => canvas.height * 0.64;

let animals=[], arrows=[], particles=[], popTexts=[];
let lastSpawn=0, spawnDelay=2400, gameT=0;

// ── audio ────────────────────────────────────────────────
let AC;
function ac() { if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }
function sfx(freq,type,dur,vol=0.28) {
  try {
    const a=ac(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  } catch(e){}
}
function shootSfx() {
  sfx(380,'sawtooth',0.08,0.2);
  setTimeout(()=>sfx(180,'sawtooth',0.12,0.15),60);
}
function hitSfx() {
  [600,800,1050].forEach((f,i)=>setTimeout(()=>sfx(f,'sine',0.18,0.2),i*55));
}

// ── rounded rect helper ───────────────────────────────────
function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// ── star shape ───────────────────────────────────────────
function star(x,y,sz,col) {
  ctx.fillStyle=col;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const oa=(i/5)*Math.PI*2-Math.PI/2, ia=oa+Math.PI/5;
    i===0?ctx.moveTo(x+Math.cos(oa)*sz,y+Math.sin(oa)*sz):ctx.lineTo(x+Math.cos(oa)*sz,y+Math.sin(oa)*sz);
    ctx.lineTo(x+Math.cos(ia)*sz*.42,y+Math.sin(ia)*sz*.42);
  }
  ctx.closePath(); ctx.fill();
}

// ── ANIMAL DRAWING ───────────────────────────────────────
// Each fn draws at origin; caller translates + optionally scale(-1,1) to flip
function drawBunny(s) {
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.ellipse(0,40*s,26*s,7*s,0,0,Math.PI*2); ctx.fill();
  // tail
  ctx.fillStyle='#fff'; ctx.strokeStyle='#ddd'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.arc(21*s,12*s,9*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // body
  ctx.fillStyle='#F5F5F5';
  ctx.beginPath(); ctx.ellipse(0,15*s,22*s,19*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // head
  ctx.beginPath(); ctx.ellipse(0,-10*s,16*s,14*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // ears
  ctx.fillStyle='#F5F5F5';
  [[-7,-32,-0.15],[7,-32,0.15]].forEach(([ex,ey,r])=>{
    ctx.beginPath(); ctx.ellipse(ex*s,ey*s,5*s,16*s,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  });
  ctx.fillStyle='#FFB6C1';
  [[-7,-32,-0.15],[7,-32,0.15]].forEach(([ex,ey,r])=>{
    ctx.beginPath(); ctx.ellipse(ex*s,ey*s,2.5*s,11*s,r,0,Math.PI*2); ctx.fill();
  });
  // eyes
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-5*s,-12*s,2.8*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5*s,-12*s,2.8*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-4*s,-13*s,1*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6*s,-13*s,1*s,0,Math.PI*2); ctx.fill();
  // cheeks
  ctx.fillStyle='rgba(255,130,130,0.45)';
  ctx.beginPath(); ctx.ellipse(-9*s,-8*s,5*s,3*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9*s,-8*s,5*s,3*s,0,0,Math.PI*2); ctx.fill();
  // nose
  ctx.fillStyle='#FFB6C1';
  ctx.beginPath(); ctx.arc(0,-7*s,3*s,0,Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-4*s,4*s,0.2,Math.PI-0.2); ctx.stroke();
  // legs
  ctx.fillStyle='#F5F5F5'; ctx.strokeStyle='#ddd'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.ellipse(-11*s,33*s,7*s,10*s,0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(11*s,33*s,7*s,10*s,-0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
}

function drawDuck(s) {
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.ellipse(0,38*s,26*s,7*s,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#FFD700'; ctx.strokeStyle='#DAA520'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,12*s,24*s,18*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // wing
  ctx.fillStyle='#FFC200';
  ctx.beginPath(); ctx.ellipse(-4*s,10*s,15*s,9*s,-0.3,0,Math.PI); ctx.fill();
  // head
  ctx.fillStyle='#FFD700'; ctx.strokeStyle='#DAA520';
  ctx.beginPath(); ctx.arc(0,-13*s,15*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // bill
  ctx.fillStyle='#FF8C00'; ctx.strokeStyle='#CC6600';
  ctx.beginPath(); ctx.ellipse(16*s,-13*s,10*s,5*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#CC6600';
  ctx.beginPath(); ctx.arc(13*s,-14*s,1.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18*s,-14*s,1.5*s,0,Math.PI*2); ctx.fill();
  // eye
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(5*s,-16*s,3*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(6*s,-17*s,1.1*s,0,Math.PI*2); ctx.fill();
  // cheek
  ctx.fillStyle='rgba(255,140,80,0.38)';
  ctx.beginPath(); ctx.ellipse(7*s,-10*s,6*s,4*s,0,0,Math.PI*2); ctx.fill();
  // feet
  ctx.strokeStyle='#FF8C00'; ctx.lineWidth=3*s; ctx.lineCap='round';
  [[-8,28],[8,28]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.moveTo(fx*s,fy*s); ctx.lineTo(fx*s,40*s); ctx.stroke();
    ctx.lineWidth=2*s;
    ctx.beginPath(); ctx.moveTo(fx*s,40*s); ctx.lineTo((fx-10)*s,45*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx*s,40*s); ctx.lineTo(fx*s,47*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx*s,40*s); ctx.lineTo((fx+10)*s,45*s); ctx.stroke();
    ctx.lineWidth=3*s;
  });
}

function drawCat(s) {
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.ellipse(0,42*s,26*s,7*s,0,0,Math.PI*2); ctx.fill();
  // tail
  ctx.strokeStyle='#FFA500'; ctx.lineWidth=5*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(22*s,15*s);
  ctx.bezierCurveTo(40*s,4*s,42*s,-14*s,30*s,-22*s); ctx.stroke();
  // body
  ctx.fillStyle='#FFA500'; ctx.strokeStyle='#CC7700'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,15*s,22*s,19*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // stripes
  ctx.strokeStyle='rgba(150,70,0,0.35)'; ctx.lineWidth=2*s;
  [-7,0,7].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x*s,-2*s); ctx.lineTo(x*s+1,28*s); ctx.stroke(); });
  // head
  ctx.fillStyle='#FFA500'; ctx.strokeStyle='#CC7700'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-12*s,18*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // ears
  [[-16,-22,-9,-36,-3,-22],[16,-22,9,-36,3,-22]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.fillStyle='#FFA500';
    ctx.beginPath(); ctx.moveTo(x1*s,y1*s); ctx.lineTo(x2*s,y2*s); ctx.lineTo(x3*s,y3*s); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#FFB6C1';
    ctx.beginPath(); ctx.moveTo((x1*.85)*s,(y1*.95)*s); ctx.lineTo(x2*s,(y2*.9)*s); ctx.lineTo((x3*.8)*s,(y3*.95)*s); ctx.fill();
  });
  // eyes
  ctx.fillStyle='#2ECC40';
  ctx.beginPath(); ctx.ellipse(-6*s,-13*s,5*s,6*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6*s,-13*s,5*s,6*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.ellipse(-6*s,-13*s,2*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6*s,-13*s,2*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-5*s,-14*s,1.1*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7*s,-14*s,1.1*s,0,Math.PI*2); ctx.fill();
  // cheeks
  ctx.fillStyle='rgba(255,130,130,0.4)';
  ctx.beginPath(); ctx.ellipse(-11*s,-8*s,6*s,3.5*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11*s,-8*s,6*s,3.5*s,0,0,Math.PI*2); ctx.fill();
  // nose
  ctx.fillStyle='#FF69B4';
  ctx.beginPath(); ctx.moveTo(-3*s,-8*s); ctx.lineTo(3*s,-8*s); ctx.lineTo(0,-5*s); ctx.fill();
  // whiskers
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
  [[-3,-6,-22,-9],[-3,-6,-22,-6],[-3,-6,-22,-3],[3,-6,22,-9],[3,-6,22,-6],[3,-6,22,-3]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1*s,y1*s); ctx.lineTo(x2*s,y2*s); ctx.stroke();
  });
  // legs + paws
  ctx.fillStyle='#FFA500'; ctx.strokeStyle='#CC7700'; ctx.lineWidth=1.5;
  rrect(-14*s,28*s,11*s,18*s,4*s); ctx.fill(); ctx.stroke();
  rrect(3*s,28*s,11*s,18*s,4*s); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#FFB366';
  ctx.beginPath(); ctx.ellipse(-8*s,46*s,8*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8*s,46*s,8*s,5*s,0,0,Math.PI*2); ctx.fill();
}

function drawChicken(s) {
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.ellipse(0,42*s,26*s,7*s,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#FFFAF0'; ctx.strokeStyle='#ddd'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,12*s,22*s,20*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#F0EFE0';
  ctx.beginPath(); ctx.ellipse(-4*s,10*s,15*s,9*s,-0.2,0,Math.PI); ctx.fill();
  // head
  ctx.fillStyle='#FFFAF0'; ctx.strokeStyle='#ddd';
  ctx.beginPath(); ctx.arc(0,-15*s,15*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // comb
  ctx.fillStyle='#EE2222';
  [[-5,-28],[0,-31],[5,-28]].forEach(([cx,cy])=>{ ctx.beginPath(); ctx.arc(cx*s,cy*s,6*s,0,Math.PI*2); ctx.fill(); });
  // wattle
  ctx.fillStyle='#FF5555';
  ctx.beginPath(); ctx.arc(5*s,-8*s,5*s,0,Math.PI*2); ctx.fill();
  // beak
  ctx.fillStyle='#FFD700'; ctx.strokeStyle='#DAA520'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(13*s,-17*s); ctx.lineTo(23*s,-13*s); ctx.lineTo(13*s,-10*s); ctx.fill(); ctx.stroke();
  // eye
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(4*s,-18*s,3*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(5*s,-19*s,1.1*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,140,80,0.35)';
  ctx.beginPath(); ctx.ellipse(6*s,-13*s,5*s,3*s,0,0,Math.PI*2); ctx.fill();
  // legs
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=3*s; ctx.lineCap='round';
  [[-8,28],[8,28]].forEach(([lx,ly])=>{
    ctx.beginPath(); ctx.moveTo(lx*s,ly*s); ctx.lineTo(lx*s,42*s); ctx.stroke();
    ctx.lineWidth=2*s;
    [[-8,0],[0,7],[8,0]].forEach(([dx,dy])=>{
      ctx.beginPath(); ctx.moveTo(lx*s,42*s); ctx.lineTo((lx+dx)*s,(42+dy)*s); ctx.stroke();
    });
    ctx.lineWidth=3*s;
  });
}

function drawBear(s) {
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath(); ctx.ellipse(0,46*s,28*s,7*s,0,0,Math.PI*2); ctx.fill();
  // body
  ctx.fillStyle='#C68642'; ctx.strokeStyle='#A0522D'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.ellipse(0,15*s,24*s,22*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#DEB887';
  ctx.beginPath(); ctx.ellipse(0,16*s,14*s,13*s,0,0,Math.PI*2); ctx.fill();
  // arms
  ctx.fillStyle='#C68642'; ctx.strokeStyle='#A0522D';
  ctx.beginPath(); ctx.ellipse(-26*s,10*s,8*s,14*s,0.4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(26*s,10*s,8*s,14*s,-0.4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // head
  ctx.fillStyle='#C68642';
  ctx.beginPath(); ctx.arc(0,-12*s,20*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // ears
  [[-17,-28],[17,-28]].forEach(([ex,ey])=>{
    ctx.fillStyle='#C68642';
    ctx.beginPath(); ctx.arc(ex*s,ey*s,9*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#DEB887';
    ctx.beginPath(); ctx.arc(ex*s,ey*s,5*s,0,Math.PI*2); ctx.fill();
  });
  // snout
  ctx.fillStyle='#DEB887';
  ctx.beginPath(); ctx.ellipse(0,-7*s,10*s,8*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.ellipse(0,-11*s,5*s,3.5*s,0,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-7*s,-17*s,3.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7*s,-17*s,3.5*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-6*s,-18*s,1.2*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8*s,-18*s,1.2*s,0,Math.PI*2); ctx.fill();
  // cheeks
  ctx.fillStyle='rgba(200,80,80,0.28)';
  ctx.beginPath(); ctx.ellipse(-11*s,-10*s,7*s,4*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11*s,-10*s,7*s,4*s,0,0,Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-2*s,5*s,0.2,Math.PI-0.2); ctx.stroke();
  // legs
  ctx.fillStyle='#C68642'; ctx.strokeStyle='#A0522D'; ctx.lineWidth=1.5;
  rrect(-16*s,32*s,13*s,18*s,4*s); ctx.fill(); ctx.stroke();
  rrect(3*s,32*s,13*s,18*s,4*s); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#A0522D';
  ctx.beginPath(); ctx.ellipse(-9*s,50*s,9*s,6*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(9*s,50*s,9*s,6*s,0,0,Math.PI*2); ctx.fill();
}

const DRAWERS = { bunny:drawBunny, duck:drawDuck, cat:drawCat, chicken:drawChicken, bear:drawBear };
const TYPES = Object.keys(DRAWERS);

// ── BOW ──────────────────────────────────────────────────
function drawBow(x, y, angle, pull) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  const R=62, arc=Math.PI/2.1;
  ctx.strokeStyle='#6B3A2A'; ctx.lineWidth=9; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,0,R,-arc,arc); ctx.stroke();
  // decorative wood grain
  ctx.strokeStyle='rgba(120,60,20,0.25)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,0,R,-arc+0.1,arc-0.1); ctx.stroke();

  const tx=R*Math.cos(-arc), ty=R*Math.sin(-arc);
  const bx=R*Math.cos(arc),  by=R*Math.sin(arc);
  const pullX = -18*pull;
  ctx.strokeStyle='#D2B48C'; ctx.lineWidth=2.8; ctx.lineCap='butt';
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(pullX,0); ctx.lineTo(bx,by); ctx.stroke();

  if(pull>0.05){
    ctx.strokeStyle='#8B6914'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(pullX,0); ctx.lineTo(R+22,0); ctx.stroke();
    ctx.fillStyle='#B0B0B0'; ctx.strokeStyle='#888'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(R+28,0); ctx.lineTo(R+14,-7); ctx.lineTo(R+14,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#E53935';
    ctx.beginPath(); ctx.moveTo(pullX+4,0); ctx.lineTo(pullX-12,-9); ctx.lineTo(pullX-6,0); ctx.fill();
    ctx.beginPath(); ctx.moveTo(pullX+4,0); ctx.lineTo(pullX-12,9); ctx.lineTo(pullX-6,0); ctx.fill();
    ctx.fillStyle='#FFA000';
    ctx.beginPath(); ctx.moveTo(pullX-4,0); ctx.lineTo(pullX-12,0); ctx.lineTo(pullX-8,-4); ctx.fill();
  }
  ctx.restore();
}

// ── KID ARCHER ───────────────────────────────────────────
function drawKid(x, y) {
  ctx.save(); ctx.translate(x-52, y);
  // shoes
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.ellipse(-10,60,14,8,-0.1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,60,14,8,0.1,0,Math.PI*2); ctx.fill();
  // pants
  ctx.fillStyle='#3F51B5';
  rrect(-17,22,14,40,4); ctx.fill();
  rrect(3,22,14,40,4); ctx.fill();
  // shirt
  ctx.fillStyle='#FF6B35';
  rrect(-18,-14,36,40,6); ctx.fill();
  // back arm
  ctx.fillStyle='#FDBCB4';
  rrect(13,-8,12,30,6); ctx.fill();
  // head
  ctx.fillStyle='#FDBCB4';
  ctx.beginPath(); ctx.arc(0,-36,24,0,Math.PI*2); ctx.fill();
  // hair
  ctx.fillStyle='#5C3317';
  ctx.beginPath(); ctx.arc(0,-48,20,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-22,-40,9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22,-40,9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-12,-55,10,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12,-55,10,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='#333';
  ctx.beginPath(); ctx.arc(-8,-36,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8,-36,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-7,-37,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-37,1.2,0,Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle='#333'; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.arc(0,-28,10,0.15,Math.PI-0.15); ctx.stroke();
  // cheeks
  ctx.fillStyle='rgba(255,100,100,0.38)';
  ctx.beginPath(); ctx.ellipse(-14,-31,7,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14,-31,7,4,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── FLYING ARROW ─────────────────────────────────────────
function drawArrow(x,y,angle) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  ctx.strokeStyle='#8B6914'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-28,0); ctx.lineTo(18,0); ctx.stroke();
  ctx.fillStyle='#B0B0B0'; ctx.strokeStyle='#888'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(24,0); ctx.lineTo(13,-7); ctx.lineTo(13,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#E53935';
  ctx.beginPath(); ctx.moveTo(-28,0); ctx.lineTo(-40,-9); ctx.lineTo(-32,0); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-28,0); ctx.lineTo(-40,9); ctx.lineTo(-32,0); ctx.fill();
  ctx.fillStyle='#FFA000';
  ctx.beginPath(); ctx.moveTo(-31,0); ctx.lineTo(-40,0); ctx.lineTo(-34,-4); ctx.fill();
  ctx.restore();
}

// ── BACKGROUND ───────────────────────────────────────────
let cloudX=[200,580,920];
function drawBG(ts) {
  const W=canvas.width, H=canvas.height, gnd=GND();
  // sky
  const sg=ctx.createLinearGradient(0,0,0,gnd);
  sg.addColorStop(0,'#29B6F6'); sg.addColorStop(1,'#B3E5FC');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,gnd);
  // ground
  const gg=ctx.createLinearGradient(0,gnd,0,H);
  gg.addColorStop(0,'#81C784'); gg.addColorStop(0.4,'#66BB6A'); gg.addColorStop(1,'#388E3C');
  ctx.fillStyle=gg; ctx.fillRect(0,gnd,W,H-gnd);
  ctx.strokeStyle='#4CAF50'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,gnd); ctx.lineTo(W,gnd); ctx.stroke();
  // sun
  const sx=W-110, sy=85;
  const sg2=ctx.createRadialGradient(sx,sy,20,sx,sy,90);
  sg2.addColorStop(0,'rgba(255,220,0,0.45)'); sg2.addColorStop(1,'rgba(255,220,0,0)');
  ctx.fillStyle=sg2; ctx.beginPath(); ctx.arc(sx,sy,90,0,Math.PI*2); ctx.fill();
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2+ts*0.0003;
    ctx.strokeStyle='rgba(255,200,0,0.7)'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(sx+Math.cos(a)*56,sy+Math.sin(a)*56); ctx.lineTo(sx+Math.cos(a)*76,sy+Math.sin(a)*76); ctx.stroke();
  }
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(sx,sy,46,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF176'; ctx.beginPath(); ctx.arc(sx-10,sy-10,16,0,Math.PI*2); ctx.fill();
  // clouds
  cloudX=cloudX.map((cx,i)=>{ const ncx=cx+(0.18+i*0.08); return ncx>W+250?-200:ncx; });
  cloudX.forEach((cx,i)=>drawCloud(cx, [65,40,90][i], [1,1.2,0.75][i]));
  // flowers & grass
  for(let fx=120;fx<W-40;fx+=72) drawFlower(fx,gnd);
  ctx.strokeStyle='#4CAF50'; ctx.lineWidth=2;
  for(let fx=90;fx<W-30;fx+=38){
    const gt=gnd;
    ctx.beginPath(); ctx.moveTo(fx,gt); ctx.lineTo(fx-5,gt-13); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx+6,gt); ctx.lineTo(fx+1,gt-16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(fx+12,gt); ctx.lineTo(fx+17,gt-12); ctx.stroke();
  }
}

function drawCloud(x,y,sc) {
  ctx.save(); ctx.translate(x,y); ctx.scale(sc,sc);
  ctx.fillStyle='rgba(255,255,255,0.93)';
  ctx.beginPath();
  ctx.arc(0,0,30,0,Math.PI*2); ctx.arc(36,-10,38,0,Math.PI*2);
  ctx.arc(78,0,28,0,Math.PI*2); ctx.arc(90,13,22,0,Math.PI*2);
  ctx.arc(52,17,32,0,Math.PI*2); ctx.arc(14,16,24,0,Math.PI*2);
  ctx.fill(); ctx.restore();
}

const PETAL_COLS=['#FF69B4','#FF6347','#9370DB','#FFD700','#FF4500','#00CED1','#FF1493'];
function drawFlower(x,y) {
  const col=PETAL_COLS[Math.floor(x/72)%PETAL_COLS.length];
  ctx.strokeStyle='#388E3C'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+22); ctx.stroke();
  ctx.fillStyle='#4CAF50';
  ctx.beginPath(); ctx.moveTo(x,y+12); ctx.quadraticCurveTo(x+13,y+7,x+11,y+19); ctx.quadraticCurveTo(x,y+18,x,y+12); ctx.fill();
  ctx.fillStyle=col;
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2;
    ctx.beginPath(); ctx.ellipse(x+Math.cos(a)*8,y+Math.sin(a)*8,5,7,a,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
}

// ── PARTICLES ─────────────────────────────────────────────
const PCOLS=['#FF6B6B','#FFE66D','#4ECDC4','#FF6B9D','#C7F464','#FFA07A','#FF69B4','#00CED1'];
const EMOJIS=['⭐','💫','✨','🌟','❤️','💕','🎉','🎊'];

function burst(x,y) {
  for(let i=0;i<18;i++){
    const a=(Math.PI*2/18)*i+Math.random()*0.2, sp=3+Math.random()*6;
    particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1.5,
      life:1, col:PCOLS[i%PCOLS.length], sz:6+Math.random()*12,
      type:Math.random()>0.45?'star':'circle', g:0.14 });
  }
  for(let i=0;i<7;i++){
    particles.push({ x:x+(Math.random()-.5)*90, y:y+(Math.random()-.5)*50,
      vx:(Math.random()-.5)*3, vy:-4-Math.random()*3,
      life:1, isText:true, text:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
      sz:28+Math.random()*24, g:0.04 });
  }
}

function popText(x,y) {
  const msgs=['POP!','YAY!','WOW!','NICE!','BOOM!','GREAT!'];
  popTexts.push({ x,y, text:msgs[Math.floor(Math.random()*msgs.length)], life:1, vy:-2.8, sz:50+Math.random()*20 });
}

// ── SPAWN ANIMAL ─────────────────────────────────────────
function spawnAnimal() {
  const type=TYPES[Math.floor(Math.random()*TYPES.length)];
  const gnd=GND();
  const sc=0.75+Math.random()*0.55;
  // Y range: on the ground line or slightly above (for variety)
  const y=gnd-(Math.random()*canvas.height*0.28);
  animals.push({ type, x:canvas.width+90, y, sc, speed:(1.6+Math.random()*2)*(canvas.width/1100), wobble:Math.random()*Math.PI*2 });
}

// ── GAME LOOP ─────────────────────────────────────────────
function loop(ts) {
  if(!gameT) gameT=ts;
  const elapsed=ts-gameT;
  const W=canvas.width, H=canvas.height, gnd=GND();
  const bowY=gnd;

  ctx.clearRect(0,0,W,H);
  drawBG(ts);

  // spawn
  spawnDelay=Math.max(1100,2400-elapsed*0.06);
  if(ts-lastSpawn>spawnDelay){ spawnAnimal(); if(elapsed>15000) spawnAnimal(); lastSpawn=ts; }

  // animals
  animals=animals.filter(a=>{
    a.x-=a.speed; a.wobble+=0.065;
    if(a.x<-130) return false;
    const bob=Math.sin(a.wobble*2)*4;
    ctx.save(); ctx.translate(a.x, a.y+bob); ctx.scale(-1,1);
    DRAWERS[a.type](a.sc);
    ctx.restore();
    return true;
  });

  // arrows
  arrows=arrows.filter(ar=>{
    ar.x+=ar.vx; ar.y+=ar.vy; ar.vy+=0.22;
    ar.angle=Math.atan2(ar.vy,ar.vx);
    if(ar.x<-80||ar.x>W+80||ar.y>H+80) return false;
    // collision
    for(let i=animals.length-1;i>=0;i--){
      const a=animals[i];
      if(Math.hypot(ar.x-a.x,ar.y-a.y)<50*a.sc){
        burst(a.x,a.y); popText(a.x,a.y-65*a.sc);
        animals.splice(i,1);
        score++; scoreEl.textContent='⭐ '+score;
        hitSfx();
        if(!hintShown){ hintEl.style.opacity='0'; hintShown=true; }
        return false;
      }
    }
    drawArrow(ar.x,ar.y,ar.angle);
    return true;
  });

  // particles
  particles=particles.filter(p=>{
    p.life-=0.019; p.x+=p.vx; p.y+=p.vy; p.vy+=p.g||0.1; p.vx*=0.97;
    if(p.life<=0) return false;
    ctx.globalAlpha=p.life;
    if(p.isText){
      ctx.font=`bold ${p.sz}px Arial`; ctx.textAlign='center';
      ctx.fillStyle='#FFD700'; ctx.strokeStyle='#333'; ctx.lineWidth=3;
      ctx.strokeText(p.text,p.x,p.y); ctx.fillText(p.text,p.x,p.y);
    } else if(p.type==='star'){
      star(p.x,p.y,p.sz,p.col);
    } else {
      ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    return true;
  });

  // pop texts
  popTexts=popTexts.filter(t=>{
    t.y+=t.vy; t.life-=0.022;
    if(t.life<=0) return false;
    ctx.globalAlpha=t.life;
    ctx.font=`bold ${t.sz}px "Arial Rounded MT Bold",Arial`;
    ctx.textAlign='center';
    ctx.fillStyle=`hsl(${(ts/8)%360},100%,55%)`;
    ctx.strokeStyle='#fff'; ctx.lineWidth=6;
    ctx.strokeText(t.text,t.x,t.y); ctx.fillText(t.text,t.x,t.y);
    ctx.globalAlpha=1;
    return true;
  });

  // aim guide
  if(animals.length>0){
    ctx.globalAlpha=0.18; ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.5;
    ctx.setLineDash([12,9]);
    ctx.beginPath(); ctx.moveTo(BOW_X,bowY); ctx.lineTo(mx,my); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
    // aim circle
    ctx.globalAlpha=0.35; ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(mx,my,18,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }

  // pull animation
  if(pulling && pullPct<1) pullPct=Math.min(1,pullPct+0.06);

  // draw kid + bow
  const ang=Math.atan2(my-bowY,mx-BOW_X);
  drawKid(BOW_X,bowY);
  drawBow(BOW_X,bowY,ang,pulling?pullPct:0.25);

  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────
function aim(x,y){ mx=x; my=y; }
function shoot(){
  const bowY=GND(), ang=Math.atan2(my-bowY,mx-BOW_X), sp=15;
  arrows.push({ x:BOW_X,y:bowY, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, angle:ang });
  shootSfx(); pulling=false; pullPct=0;
}

canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top);});
canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top);pulling=true;pullPct=0;});
canvas.addEventListener('mouseup',()=>{ if(pulling) shoot(); });
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);pulling=true;pullPct=0;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(pulling)shoot();},{passive:false});

// fade hint after 5s
setTimeout(()=>{ if(!hintShown){ hintEl.style.opacity='0'; } },5000);

requestAnimationFrame(loop);
</script>
</body>
