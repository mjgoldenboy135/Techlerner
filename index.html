<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bow &amp; Arrow Fun!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none}
body{overflow:hidden;background:#0055BB}
canvas{display:block}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;pointer-events:none}
#title{font-family:"Arial Rounded MT Bold","Comic Sans MS",Arial,sans-serif;font-size:34px;color:#FFE600;text-shadow:3px 3px 0 #FF4400,5px 5px 8px rgba(0,0,0,0.4)}
#score{font-family:"Arial Rounded MT Bold","Comic Sans MS",Arial,sans-serif;font-size:42px;color:#fff;text-shadow:2px 2px 0 #000;background:rgba(0,0,0,0.35);padding:4px 20px;border-radius:28px;border:3px solid #FFE600}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"><div id="title">🏹 Bow Fun!</div><div id="score">⭐ 0</div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('score');
let W=0,H=0;
function resize(){
  const dpr=window.devicePixelRatio||1;
  W=innerWidth;H=innerHeight;
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();addEventListener('resize',resize);

const GND=()=>H*0.68;
const BOW_X=90;
let score=0,mx=W*.65,my=H*.45,pulling=false,pullPct=0;
let animals=[],arrows=[],particles=[],popTexts=[];
let lastSpawn=0,spawnDelay=2200,gameT=0,sunA=0;
let cloudX=[150,520,880,1240];

// ── Audio ─────────────────────────────────────────
let AC;
function ac(){return AC=AC||new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,t,d,v=0.25){
  try{const a=ac(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d)}catch(e){}}
function shootSfx(){tone(340,'sawtooth',.08,.22);setTimeout(()=>tone(150,'sawtooth',.12,.16),65)}
function hitSfx(){[680,880,1120].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.18,.22),i*55))}

// ── Helpers ────────────────────────────────────────
function rrect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function ol(w=2.5,c='#0D0500'){ctx.strokeStyle=c;ctx.lineWidth=w;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke()}
function star5(x,y,sz,col){
  ctx.fillStyle=col;ctx.beginPath();
  for(let i=0;i<5;i++){const oa=(i/5)*Math.PI*2-Math.PI/2,ia=oa+Math.PI/5;
  i===0?ctx.moveTo(x+Math.cos(oa)*sz,y+Math.sin(oa)*sz):ctx.lineTo(x+Math.cos(oa)*sz,y+Math.sin(oa)*sz);
  ctx.lineTo(x+Math.cos(ia)*sz*.42,y+Math.sin(ia)*sz*.42)}ctx.closePath();ctx.fill()}

// ══════════════════════════════════════════════════
// BUNNY — hops on ground
// ══════════════════════════════════════════════════
function drawBunny(s,step){
  const air=Math.sin(step*2.5)>0; // in air phase
  // ears (slight trail when airborne)
  const eLean=air?.18:0;
  [[-6,-28,.-.12],[6,-28,.12]].forEach(([ex,ey,base],i)=>{
    const r=base+(i===0?eLean:-eLean);
    ctx.save();ctx.rotate(r);
    ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.ellipse(ex*s,ey*s,4*s,13*s,base,0,Math.PI*2);ctx.fill();ol(2.2);
    ctx.fillStyle='#FF0099';ctx.beginPath();ctx.ellipse(ex*s,ey*s,2.2*s,9*s,base,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // body
  ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.ellipse(0,10*s,17*s,14*s,0,0,Math.PI*2);ctx.fill();ol(2.5);
  // tail
  ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.arc(17*s,10*s,7*s,0,Math.PI*2);ctx.fill();ol(2);
  // back legs
  const bk=air?.9:.55;
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();ctx.ellipse(-7*s,23*s,5*s,9*s,bk-.2,0,Math.PI*2);ctx.fill();ol(2);
  ctx.beginPath();ctx.ellipse(7*s,23*s,5*s,9*s,-bk+.2,0,Math.PI*2);ctx.fill();ol(2);
  // head
  ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.ellipse(0,-9*s,13*s,11*s,0,0,Math.PI*2);ctx.fill();ol(2.5);
  // eyes
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-5*s,-10*s,2.8*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5*s,-10*s,2.8*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-4*s,-11*s,1.1*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6*s,-11*s,1.1*s,0,Math.PI*2);ctx.fill();
  // cheeks
  ctx.fillStyle='rgba(255,0,140,.35)';
  ctx.beginPath();ctx.ellipse(-8*s,-6*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(8*s,-6*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
  // nose
  ctx.fillStyle='#FF1493';ctx.beginPath();ctx.arc(0,-5*s,3*s,0,Math.PI*2);ctx.fill();ol(1.5,'#CC0077');
  // smile
  ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-2.5*s,3.5*s,.2,Math.PI-.2);ctx.stroke();
  // front paws
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();ctx.ellipse(-7*s,18*s,4*s,6*s,.3,0,Math.PI*2);ctx.fill();ol(1.8);
  ctx.beginPath();ctx.ellipse(7*s,18*s,4*s,6*s,-.3,0,Math.PI*2);ctx.fill();ol(1.8);
}

// ══════════════════════════════════════════════════
// DUCK — flies through air, wings flap
// ══════════════════════════════════════════════════
function drawDuck(s,step){
  const wa=Math.sin(step*4.5)*.72;
  // upper wing
  ctx.fillStyle='#FFB300';ctx.save();ctx.rotate(-wa-.1);
  ctx.beginPath();ctx.ellipse(0,-10*s,16*s,6*s,-.35,0,Math.PI*2);ctx.fill();ol(2.2);ctx.restore();
  // body
  ctx.fillStyle='#FFE600';ctx.beginPath();ctx.ellipse(0,8*s,19*s,13*s,.1,0,Math.PI*2);ctx.fill();ol(2.8);
  // lower wing
  ctx.fillStyle='#FFCC00';ctx.save();ctx.rotate(wa+.15);
  ctx.beginPath();ctx.ellipse(-1*s,5*s,14*s,5*s,.3,0,Math.PI*2);ctx.fill();ol(2);ctx.restore();
  // tail
  ctx.fillStyle='#FFB300';ctx.beginPath();ctx.moveTo(-17*s,7*s);ctx.lineTo(-27*s,1*s);ctx.lineTo(-17*s,15*s);ctx.fill();ol(2);
  // head
  ctx.fillStyle='#FFE600';ctx.beginPath();ctx.arc(0,-13*s,12*s,0,Math.PI*2);ctx.fill();ol(2.8);
  // bill
  ctx.fillStyle='#FF6600';ctx.beginPath();ctx.ellipse(13*s,-13*s,9*s,5*s,0,0,Math.PI*2);ctx.fill();ol(2.2);
  // nostrils
  ctx.fillStyle='#CC4400';ctx.beginPath();ctx.arc(11*s,-14*s,1.4*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(16*s,-14*s,1.4*s,0,Math.PI*2);ctx.fill();
  // eye
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(4*s,-16*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(5*s,-17*s,1.1*s,0,Math.PI*2);ctx.fill();
  // cheek
  ctx.fillStyle='rgba(255,100,0,.3)';ctx.beginPath();ctx.ellipse(6*s,-10*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
  // dangling feet
  ctx.strokeStyle='#FF6600';ctx.lineWidth=2.5*s;ctx.lineCap='round';
  [[-5,20],[5,20]].forEach(([fx,fy])=>{
    ctx.beginPath();ctx.moveTo(fx*s,fy*s);ctx.lineTo(fx*s,(fy+9)*s);ctx.stroke();
    ctx.lineWidth=1.8*s;
    [[-6,4],[0,6],[6,4]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(fx*s,(fy+9)*s);ctx.lineTo((fx+dx)*s,(fy+9+dy)*s);ctx.stroke()});
    ctx.lineWidth=2.5*s;
  });
}

// ══════════════════════════════════════════════════
// CAT — walks on ground with leg swing
// ══════════════════════════════════════════════════
function drawCat(s,step){
  const lg=Math.sin(step),bob=Math.sin(step*2)*1.5,ts=Math.sin(step*.6)*.4;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(0,(36+bob)*s,20*s,5*s,0,0,Math.PI*2);ctx.fill();
  // tail
  ctx.strokeStyle='#FF5500';ctx.lineWidth=5*s;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(19*s,(10+bob)*s);
  ctx.bezierCurveTo(34*s+ts*18*s,(bob)*s,37*s+ts*14*s,(-14+bob)*s,27*s,(-22+bob)*s);ctx.stroke();
  ol(2.2,'#0D0500');
  // back legs (drawn behind body)
  ctx.fillStyle='#FF6B00';
  ctx.save();ctx.translate(-8*s,(28+bob)*s);ctx.rotate(-lg*.3);
  rrect(-4*s,0,8*s,15*s,3*s);ctx.fill();ol(2);ctx.restore();
  ctx.save();ctx.translate(8*s,(28+bob)*s);ctx.rotate(lg*.3);
  rrect(-4*s,0,8*s,15*s,3*s);ctx.fill();ol(2);ctx.restore();
  // body
  ctx.fillStyle='#FF6B00';ctx.beginPath();ctx.ellipse(0,(12+bob)*s,17*s,14*s,0,0,Math.PI*2);ctx.fill();ol(2.8);
  // stripes
  ctx.strokeStyle='#CC2200';ctx.lineWidth=2*s;
  [-6,0,6].forEach(x=>{ctx.beginPath();ctx.moveTo(x*s,(-1+bob)*s);ctx.lineTo((x+1)*s,(24+bob)*s);ctx.stroke()});
  // head
  ctx.fillStyle='#FF6B00';ctx.beginPath();ctx.arc(0,(-12+bob)*s,15*s,0,Math.PI*2);ctx.fill();ol(2.8);
  // ears
  [[-13,-21,-7,-34,-1,-21],[13,-21,7,-34,1,-21]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.fillStyle='#FF6B00';ctx.beginPath();
    ctx.moveTo(x1*s,(y1+bob)*s);ctx.lineTo(x2*s,(y2+bob)*s);ctx.lineTo(x3*s,(y3+bob)*s);ctx.fill();ol(2.2);
    ctx.fillStyle='#FF99CC';ctx.beginPath();
    ctx.moveTo(x1*.82*s,((y1+1)+bob)*s);ctx.lineTo(x2*s,(y2*.9+bob)*s);ctx.lineTo(x3*.82*s,((y3+1)+bob)*s);ctx.fill();
  });
  // front legs (swing opposite)
  ctx.fillStyle='#FF6B00';
  ctx.save();ctx.translate(-8*s,(20+bob)*s);ctx.rotate(lg*.3);
  rrect(-4*s,0,8*s,13*s,3*s);ctx.fill();ol(2);ctx.restore();
  ctx.save();ctx.translate(8*s,(20+bob)*s);ctx.rotate(-lg*.3);
  rrect(-4*s,0,8*s,13*s,3*s);ctx.fill();ol(2);ctx.restore();
  // paws
  ctx.fillStyle='#FFAA55';
  ctx.beginPath();ctx.ellipse(-8*s,(33+bob)*s,7*s,4*s,0,0,Math.PI*2);ctx.fill();ol(1.8);
  ctx.beginPath();ctx.ellipse(8*s,(33+bob)*s,7*s,4*s,0,0,Math.PI*2);ctx.fill();ol(1.8);
  // eyes (vivid green)
  ctx.fillStyle='#00EE00';
  ctx.beginPath();ctx.ellipse(-5*s,(-13+bob)*s,4.5*s,5.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(5*s,(-13+bob)*s,4.5*s,5.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(-5*s,(-13+bob)*s,1.8*s,4.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(5*s,(-13+bob)*s,1.8*s,4.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-4*s,(-14+bob)*s,1.1*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6*s,(-14+bob)*s,1.1*s,0,Math.PI*2);ctx.fill();
  // nose + whiskers + cheeks
  ctx.fillStyle='#FF1493';ctx.beginPath();ctx.moveTo(-3*s,(-7+bob)*s);ctx.lineTo(3*s,(-7+bob)*s);ctx.lineTo(0,(-4+bob)*s);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;
  [[-3,-6,-20,-8],[-3,-6,-20,-5],[3,-6,20,-8],[3,-6,20,-5]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1*s,(y1+bob)*s);ctx.lineTo(x2*s,(y2+bob)*s);ctx.stroke()});
  ctx.fillStyle='rgba(255,60,0,.25)';
  ctx.beginPath();ctx.ellipse(-10*s,(-8+bob)*s,6*s,3*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10*s,(-8+bob)*s,6*s,3*s,0,0,Math.PI*2);ctx.fill();
}

// ══════════════════════════════════════════════════
// CHICKEN — flies, wings flap
// ══════════════════════════════════════════════════
function drawChicken(s,step){
  const wa=Math.sin(step*3.8)*.65;
  // upper wing
  ctx.fillStyle='#F0F0D0';ctx.save();ctx.rotate(-wa-.15);
  ctx.beginPath();ctx.ellipse(0,-4*s,17*s,6*s,-.2,0,Math.PI*2);ctx.fill();ol(2.2);ctx.restore();
  // body
  ctx.fillStyle='#FFFAEE';ctx.beginPath();ctx.ellipse(0,10*s,16*s,14*s,0,0,Math.PI*2);ctx.fill();ol(2.8);
  // lower wing
  ctx.fillStyle='#E8E8C8';ctx.save();ctx.rotate(wa+.2);
  ctx.beginPath();ctx.ellipse(-2*s,12*s,13*s,5*s,.2,0,Math.PI*2);ctx.fill();ol(2);ctx.restore();
  // tail
  ctx.fillStyle='#DDDDBB';ctx.beginPath();ctx.moveTo(-15*s,10*s);ctx.lineTo(-25*s,2*s);ctx.lineTo(-15*s,17*s);ctx.fill();ol(1.8);
  // head
  ctx.fillStyle='#FFFAEE';ctx.beginPath();ctx.arc(0,-13*s,12*s,0,Math.PI*2);ctx.fill();ol(2.8);
  // comb (bright red, 3 bumps)
  ctx.fillStyle='#FF0000';
  [[-5,-25],[0,-28],[5,-25]].forEach(([cx,cy])=>{ctx.beginPath();ctx.arc(cx*s,cy*s,5*s,0,Math.PI*2);ctx.fill();ol(1.8)});
  // wattle
  ctx.fillStyle='#FF3333';ctx.beginPath();ctx.arc(5*s,-7*s,4*s,0,Math.PI*2);ctx.fill();ol(1.5);
  // beak
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.moveTo(11*s,-15*s);ctx.lineTo(21*s,-11*s);ctx.lineTo(11*s,-8*s);ctx.fill();ol(1.8);
  // eye
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(3*s,-16*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(4*s,-17*s,1.1*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,100,0,.28)';ctx.beginPath();ctx.ellipse(5*s,-11*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
  // dangling feet
  ctx.strokeStyle='#FFD700';ctx.lineWidth=2.5*s;ctx.lineCap='round';
  [[-5,22],[5,22]].forEach(([fx,fy])=>{
    ctx.beginPath();ctx.moveTo(fx*s,fy*s);ctx.lineTo(fx*s,(fy+9)*s);ctx.stroke();
    ctx.lineWidth=1.8*s;
    [[-5,4],[0,6],[5,4]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(fx*s,(fy+9)*s);ctx.lineTo((fx+dx)*s,(fy+9+dy)*s);ctx.stroke()});
    ctx.lineWidth=2.5*s;
  });
}

// ══════════════════════════════════════════════════
// BEAR — walks, lumbers
// ══════════════════════════════════════════════════
function drawBear(s,step){
  const lg=Math.sin(step*.8),bob=Math.sin(step*1.6)*2;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,(42+bob)*s,22*s,5*s,0,0,Math.PI*2);ctx.fill();
  // back legs
  ctx.fillStyle='#DD7700';
  ctx.save();ctx.translate(-10*s,(30+bob)*s);ctx.rotate(-lg*.28);
  rrect(-5*s,0,10*s,16*s,4*s);ctx.fill();ol(2.2);ctx.restore();
  ctx.save();ctx.translate(10*s,(30+bob)*s);ctx.rotate(lg*.28);
  rrect(-5*s,0,10*s,16*s,4*s);ctx.fill();ol(2.2);ctx.restore();
  // body
  ctx.fillStyle='#DD7700';ctx.beginPath();ctx.ellipse(0,(12+bob)*s,21*s,18*s,0,0,Math.PI*2);ctx.fill();ol(3);
  // belly
  ctx.fillStyle='#FFBB44';ctx.beginPath();ctx.ellipse(0,(13+bob)*s,12*s,11*s,0,0,Math.PI*2);ctx.fill();
  // front legs (opposite swing)
  ctx.fillStyle='#DD7700';
  ctx.save();ctx.translate(-14*s,(20+bob)*s);ctx.rotate(lg*.28);
  rrect(-5*s,0,10*s,17*s,4*s);ctx.fill();ol(2.2);ctx.restore();
  ctx.save();ctx.translate(14*s,(20+bob)*s);ctx.rotate(-lg*.28);
  rrect(-5*s,0,10*s,17*s,4*s);ctx.fill();ol(2.2);ctx.restore();
  // head
  ctx.fillStyle='#DD7700';ctx.beginPath();ctx.arc(0,(-13+bob)*s,17*s,0,Math.PI*2);ctx.fill();ol(3);
  // ears
  [[-15,-28],[15,-28]].forEach(([ex,ey])=>{
    ctx.fillStyle='#DD7700';ctx.beginPath();ctx.arc(ex*s,(ey+bob)*s,8*s,0,Math.PI*2);ctx.fill();ol(2.2);
    ctx.fillStyle='#FFBB44';ctx.beginPath();ctx.arc(ex*s,(ey+bob)*s,4.5*s,0,Math.PI*2);ctx.fill();
  });
  // snout
  ctx.fillStyle='#FFBB44';ctx.beginPath();ctx.ellipse(0,(-7+bob)*s,9*s,7*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(0,(-11+bob)*s,4.5*s,3*s,0,0,Math.PI*2);ctx.fill();
  // eyes
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-7*s,(-17+bob)*s,3.2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(7*s,(-17+bob)*s,3.2*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-6*s,(-18+bob)*s,1.2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8*s,(-18+bob)*s,1.2*s,0,Math.PI*2);ctx.fill();
  // cheeks
  ctx.fillStyle='rgba(200,70,0,.28)';
  ctx.beginPath();ctx.ellipse(-11*s,(-10+bob)*s,7*s,4*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(11*s,(-10+bob)*s,7*s,4*s,0,0,Math.PI*2);ctx.fill();
  // smile
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,(-2+bob)*s,4.5*s,.2,Math.PI-.2);ctx.stroke();
  // paws
  ctx.fillStyle='#AA4400';
  ctx.beginPath();ctx.ellipse(-10*s,(46+bob)*s,9*s,5*s,0,0,Math.PI*2);ctx.fill();ol(2.2);
  ctx.beginPath();ctx.ellipse(10*s,(46+bob)*s,9*s,5*s,0,0,Math.PI*2);ctx.fill();ol(2.2);
}

const DRAWERS={bunny:drawBunny,duck:drawDuck,cat:drawCat,chicken:drawChicken,bear:drawBear};
const TYPES=Object.keys(DRAWERS);
const MTYPE={bunny:'hop',duck:'fly',cat:'walk',chicken:'fly',bear:'walk'};

// ── Bow ────────────────────────────────────────────
function drawBow(x,y,ang,pull){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang);
  const R=50,arc=Math.PI/2.1;
  ctx.strokeStyle='#6B3010';ctx.lineWidth=9;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,0,R,-arc,arc);ctx.stroke();
  ctx.strokeStyle='rgba(180,90,20,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,0,R-3,-arc+.1,arc-.1);ctx.stroke();
  const tx=R*Math.cos(-arc),ty=R*Math.sin(-arc),bx=R*Math.cos(arc),by=R*Math.sin(arc);
  const px=-16*pull;
  ctx.strokeStyle='#FFE060';ctx.lineWidth=2.8;ctx.lineCap='butt';
  ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(px,0);ctx.lineTo(bx,by);ctx.stroke();
  if(pull>.05){
    ctx.strokeStyle='#CC6600';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(R+18,0);ctx.stroke();
    ctx.fillStyle='#BBBBBB';ctx.strokeStyle='#666';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(R+24,0);ctx.lineTo(R+12,-7);ctx.lineTo(R+12,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#EE2200';
    ctx.beginPath();ctx.moveTo(px+4,0);ctx.lineTo(px-10,-8);ctx.lineTo(px-5,0);ctx.fill();
    ctx.beginPath();ctx.moveTo(px+4,0);ctx.lineTo(px-10,8);ctx.lineTo(px-5,0);ctx.fill();
  }
  ctx.restore();
}

// ── Kid archer (small) ─────────────────────────────
function drawKid(x,y){
  ctx.save();ctx.translate(x-38,y);
  // shoes
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.ellipse(-7,44,10,5,-.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(7,44,10,5,.1,0,Math.PI*2);ctx.fill();
  // pants
  ctx.fillStyle='#FF4400';rrect(-13,16,11,30,3);ctx.fill();rrect(2,16,11,30,3);ctx.fill();
  // shirt
  ctx.fillStyle='#0044FF';rrect(-14,-11,28,30,5);ctx.fill();
  // collar white
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-12,7,Math.PI,0);ctx.fill();
  // back arm
  ctx.fillStyle='#FFCC88';rrect(9,-7,9,22,5);ctx.fill();
  // head
  ctx.fillStyle='#FFCC88';ctx.beginPath();ctx.arc(0,-24,18,0,Math.PI*2);ctx.fill();ol(2.2);
  // hair
  ctx.fillStyle='#5C2800';
  ctx.beginPath();ctx.arc(0,-33,15,Math.PI,0);ctx.fill();
  ctx.beginPath();ctx.arc(-15,-26,7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(15,-26,7,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-8,-39,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-39,8,0,Math.PI*2);ctx.fill();
  // eyes
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-6,-24,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,-24,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-25,1.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(7,-25,1.1,0,Math.PI*2);ctx.fill();
  // smile
  ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-18,7,.2,Math.PI-.2);ctx.stroke();
  // cheeks
  ctx.fillStyle='rgba(255,70,70,.38)';
  ctx.beginPath();ctx.ellipse(-11,-19,6,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(11,-19,6,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── Flying arrow ───────────────────────────────────
function drawArrow(x,y,ang){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang);
  ctx.strokeStyle='#CC6600';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(15,0);ctx.stroke();
  ctx.fillStyle='#BBBBBB';ctx.strokeStyle='#666';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(21,0);ctx.lineTo(10,-6);ctx.lineTo(10,6);ctx.fill();ctx.stroke();
  ctx.fillStyle='#FF2200';
  ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(-33,-7);ctx.lineTo(-26,0);ctx.fill();
  ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(-33,7);ctx.lineTo(-26,0);ctx.fill();
  ctx.restore();
}

// ── Background ─────────────────────────────────────
function drawBG(ts){
  const gnd=GND();
  // Sky
  const sg=ctx.createLinearGradient(0,0,0,gnd);
  sg.addColorStop(0,'#0055BB');sg.addColorStop(.55,'#0088EE');sg.addColorStop(1,'#44AAFF');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,gnd);
  // Ground
  const gg=ctx.createLinearGradient(0,gnd,0,H);
  gg.addColorStop(0,'#44FF55');gg.addColorStop(.4,'#22BB33');gg.addColorStop(1,'#117722');
  ctx.fillStyle=gg;ctx.fillRect(0,gnd,W,H-gnd);
  // Ground edge
  ctx.strokeStyle='#55FF66';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,gnd);ctx.lineTo(W,gnd);ctx.stroke();
  // Sun
  sunA+=.004;
  const sx=W-95,sy=80;
  const gl=ctx.createRadialGradient(sx,sy,20,sx,sy,95);
  gl.addColorStop(0,'rgba(255,220,0,.5)');gl.addColorStop(1,'rgba(255,120,0,0)');
  ctx.fillStyle=gl;ctx.beginPath();ctx.arc(sx,sy,95,0,Math.PI*2);ctx.fill();
  for(let i=0;i<12;i++){
    const a=sunA+(i/12)*Math.PI*2;
    ctx.strokeStyle=`rgba(255,${150+Math.sin(a+1)*60|0},0,.85)`;ctx.lineWidth=3.5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(sx+Math.cos(a)*52,sy+Math.sin(a)*52);ctx.lineTo(sx+Math.cos(a)*74,sy+Math.sin(a)*74);ctx.stroke();
  }
  ctx.fillStyle='#FFE000';ctx.beginPath();ctx.arc(sx,sy,42,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#FF8800';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#FFF44F';ctx.beginPath();ctx.arc(sx-9,sy-9,13,0,Math.PI*2);ctx.fill();
  // Clouds
  cloudX=cloudX.map((cx,i)=>{const n=cx+.14+i*.05;return n>W+260?-200:n});
  cloudX.forEach((cx,i)=>drawCloud(cx,[55,38,82,62][i],[1,1.2,.72,.88][i]));
  // Flowers + grass
  for(let fx=110;fx<W-30;fx+=60)drawFlower(fx,gnd);
  ctx.strokeStyle='#66FF77';ctx.lineWidth=2;
  for(let fx=80;fx<W-20;fx+=30){
    ctx.beginPath();ctx.moveTo(fx,gnd);ctx.lineTo(fx-4,gnd-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx+5,gnd);ctx.lineTo(fx+2,gnd-15);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx+10,gnd);ctx.lineTo(fx+14,gnd-11);ctx.stroke();
  }
}

function drawCloud(x,y,sc){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  ctx.fillStyle='rgba(100,160,255,.18)';
  ctx.beginPath();ctx.arc(4,4,30,0,Math.PI*2);ctx.arc(39,0,38,0,Math.PI*2);
  ctx.arc(81,4,28,0,Math.PI*2);ctx.arc(92,16,22,0,Math.PI*2);
  ctx.arc(54,20,32,0,Math.PI*2);ctx.arc(15,18,24,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFFFFF';
  ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);ctx.arc(35,-10,38,0,Math.PI*2);
  ctx.arc(77,0,28,0,Math.PI*2);ctx.arc(88,12,22,0,Math.PI*2);
  ctx.arc(50,16,32,0,Math.PI*2);ctx.arc(11,14,24,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

const PCOLS=['#FF0066','#FF4400','#9900FF','#FFE600','#FF0000','#00CCFF','#FF00AA'];
function drawFlower(x,y){
  const col=PCOLS[Math.floor(x/60)%PCOLS.length];
  ctx.strokeStyle='#22AA33';ctx.lineWidth=2.2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+20);ctx.stroke();
  ctx.fillStyle='#44BB33';ctx.beginPath();ctx.moveTo(x,y+10);ctx.quadraticCurveTo(x+12,y+5,x+10,y+17);ctx.quadraticCurveTo(x,y+17,x,y+10);ctx.fill();
  ctx.fillStyle=col;
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.ellipse(x+Math.cos(a)*8,y+Math.sin(a)*8,5,8,a,0,Math.PI*2);ctx.fill()}
  ctx.fillStyle='#FFE600';ctx.beginPath();ctx.arc(x,y,5.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#CC8800';ctx.lineWidth=1.5;ctx.stroke();
}

// ── Particles ──────────────────────────────────────
const PCLR=['#FF0000','#FF6600','#FFEE00','#00EE44','#0077FF','#8800FF','#FF00AA','#00FFEE'];
const EMOJI=['⭐','💫','✨','🌟','❤️','🎉','🌈','💥'];
const PMSG=['POP!','YAY!','WOW!','NICE!','BOOM!','GREAT!','YEE-HA!'];

function burst(x,y){
  for(let i=0;i<20;i++){
    const a=(Math.PI*2/20)*i,sp=4+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,col:PCLR[i%8],sz:7+Math.random()*13,type:Math.random()>.5?'star':'dot',g:.15});
  }
  for(let i=0;i<8;i++)
    particles.push({x:x+(Math.random()-.5)*100,y:y+(Math.random()-.5)*50,vx:(Math.random()-.5)*3.5,vy:-4.5-Math.random()*3,life:1,isText:true,text:EMOJI[Math.floor(Math.random()*EMOJI.length)],sz:30+Math.random()*24,g:.04});
}
function popText(x,y){popTexts.push({x,y,text:PMSG[Math.floor(Math.random()*PMSG.length)],life:1,vy:-3,sz:50+Math.random()*18})}

// ── Spawn ──────────────────────────────────────────
function spawnAnimal(){
  const type=TYPES[Math.floor(Math.random()*TYPES.length)];
  const mt=MTYPE[type];
  const gnd=GND();
  const baseY=mt==='fly'?gnd-110-Math.random()*(H*.32):gnd-4;
  animals.push({type,x:W+80,baseY,sc:.42+Math.random()*.16,speed:(1.8+Math.random()*2.2)*(W/1100),step:Math.random()*Math.PI*2,moveType:mt});
}

// ── Game loop ──────────────────────────────────────
function loop(ts){
  if(!gameT)gameT=ts;
  const elapsed=ts-gameT,gnd=GND(),bowY=gnd;
  ctx.clearRect(0,0,W,H);
  drawBG(ts);

  spawnDelay=Math.max(1000,2200-elapsed*.05);
  if(ts-lastSpawn>spawnDelay){spawnAnimal();if(elapsed>12000)spawnAnimal();lastSpawn=ts}

  // Animals
  animals=animals.filter(a=>{
    a.x-=a.speed;a.step+=a.speed*.09+.04;
    if(a.x<-120)return false;
    let dy=a.baseY;
    if(a.moveType==='hop')dy=a.baseY-Math.abs(Math.sin(a.step*2.5))*28*a.sc;
    else if(a.moveType==='fly')dy=a.baseY+Math.sin(a.step*.55)*22;
    // ground shadow for hop/fly
    if(a.moveType!=='walk'){
      const dist=Math.abs(dy-gnd),alpha=Math.max(.04,.28-dist/160);
      ctx.globalAlpha=alpha;ctx.fillStyle='rgba(0,0,0,.5)';
      ctx.beginPath();ctx.ellipse(a.x,gnd,18*a.sc,4*a.sc,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    }
    ctx.save();ctx.translate(a.x,dy);ctx.scale(-1,1);
    DRAWERS[a.type](a.sc,a.step);
    ctx.restore();
    return true;
  });

  // Arrows
  arrows=arrows.filter(ar=>{
    ar.x+=ar.vx;ar.y+=ar.vy;ar.vy+=.22;ar.angle=Math.atan2(ar.vy,ar.vx);
    if(ar.x<-80||ar.x>W+80||ar.y>H+80)return false;
    for(let i=animals.length-1;i>=0;i--){
      const a=animals[i];
      let ay=a.baseY;
      if(a.moveType==='hop')ay=a.baseY-Math.abs(Math.sin(a.step*2.5))*28*a.sc;
      else if(a.moveType==='fly')ay=a.baseY+Math.sin(a.step*.55)*22;
      if(Math.hypot(ar.x-a.x,ar.y-ay)<42*a.sc){
        burst(a.x,ay);popText(a.x,ay-58*a.sc);
        animals.splice(i,1);score++;scoreEl.textContent='⭐ '+score;hitSfx();return false;
      }
    }
    drawArrow(ar.x,ar.y,ar.angle);return true;
  });

  // Particles
  particles=particles.filter(p=>{
    p.life-=.018;p.x+=p.vx;p.y+=p.vy;p.vy+=p.g||.1;p.vx*=.97;
    if(p.life<=0)return false;
    ctx.globalAlpha=p.life;
    if(p.isText){ctx.font=`bold ${p.sz}px Arial`;ctx.textAlign='center';ctx.fillStyle='#FFE600';ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.strokeText(p.text,p.x,p.y);ctx.fillText(p.text,p.x,p.y)}
    else if(p.type==='star')star5(p.x,p.y,p.sz,p.col);
    else{ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill()}
    ctx.globalAlpha=1;return true;
  });

  // Pop texts
  popTexts=popTexts.filter(t=>{
    t.y+=t.vy;t.life-=.022;if(t.life<=0)return false;
    ctx.globalAlpha=t.life;
    ctx.font=`bold ${t.sz}px "Arial Rounded MT Bold",Arial`;ctx.textAlign='center';
    ctx.fillStyle=`hsl(${(ts/7)%360},100%,52%)`;ctx.strokeStyle='#fff';ctx.lineWidth=7;
    ctx.strokeText(t.text,t.x,t.y);ctx.fillText(t.text,t.x,t.y);ctx.globalAlpha=1;return true;
  });

  // Aim guide
  if(animals.length>0){
    ctx.globalAlpha=.2;ctx.strokeStyle='#FFE600';ctx.lineWidth=2.5;ctx.setLineDash([12,9]);
    ctx.beginPath();ctx.moveTo(BOW_X,bowY);ctx.lineTo(mx,my);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
    ctx.globalAlpha=.4;ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(mx,my,16,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=.8;ctx.fillStyle='#FF0000';ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  if(pulling&&pullPct<1)pullPct=Math.min(1,pullPct+.06);
  const ang=Math.atan2(my-bowY,mx-BOW_X);
  drawKid(BOW_X,bowY);
  drawBow(BOW_X,bowY,ang,pulling?pullPct:.22);
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────
function aim(x,y){mx=x;my=y}
function shoot(){
  const ang=Math.atan2(my-GND(),mx-BOW_X);
  arrows.push({x:BOW_X,y:GND(),vx:Math.cos(ang)*15,vy:Math.sin(ang)*15,angle:ang});
  shootSfx();pulling=false;pullPct=0;
}
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top)});
canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top);pulling=true;pullPct=0});
canvas.addEventListener('mouseup',()=>{if(pulling)shoot()});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top)},{passive:false});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);pulling=true;pullPct=0},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(pulling)shoot()},{passive:false});
requestAnimationFrame(loop);
</script>
