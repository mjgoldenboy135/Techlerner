<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bow &amp; Arrow Fun!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
body { overflow:hidden; background:#1a0a2e; }
canvas { display:block; }
#hud {
  position:absolute; top:0; left:0; right:0;
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 18px; pointer-events:none;
}
#title {
  font-family:'Arial Rounded MT Bold','Comic Sans MS',Arial,sans-serif;
  font-size:clamp(22px,5vw,40px);
  background:linear-gradient(90deg,#ff0000,#ff8800,#ffe600,#00ff44,#00bbff,#aa00ff,#ff00aa,#ff0000);
  background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; animation:rainbow 2s linear infinite, titleFloat 2.5s ease-in-out infinite;
  filter:drop-shadow(0 0 10px #FFD700);
}
@keyframes rainbow { 0%{background-position:0%} 100%{background-position:300%} }
@keyframes titleFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
#score {
  font-family:'Arial Rounded MT Bold','Comic Sans MS',Arial,sans-serif;
  font-size:clamp(26px,6vw,46px); color:#FFD700;
  background:rgba(80,0,160,0.8); padding:5px 20px; border-radius:40px;
  border:3px solid #FFD700;
  box-shadow:0 0 20px #FF00FF, 0 0 40px rgba(255,0,255,0.35), inset 0 0 12px rgba(255,0,255,0.1);
}
#score.pop { animation:scorePop 0.4s ease-out forwards; }
@keyframes scorePop { 0%{transform:scale(1)} 35%{transform:scale(1.55)} 100%{transform:scale(1)} }
#combo {
  position:absolute; left:50%; top:76px; transform:translateX(-50%);
  font-family:'Arial Rounded MT Bold','Comic Sans MS',Arial,sans-serif;
  font-size:clamp(20px,5vw,38px); color:#FF4400;
  text-shadow:0 0 14px #FF8800, 2px 2px 0 #fff;
  pointer-events:none; opacity:0;
}
#combo.show { animation:comboPop 0.55s ease-out forwards; }
@keyframes comboPop {
  0%{opacity:0;transform:translateX(-50%) scale(0.5)}
  45%{opacity:1;transform:translateX(-50%) scale(1.3)}
  100%{opacity:1;transform:translateX(-50%) scale(1)}
}
#hint {
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  font-family:'Arial Rounded MT Bold','Comic Sans MS',Arial,sans-serif;
  font-size:clamp(15px,3.5vw,22px); color:rgba(255,255,255,0.95);
  background:rgba(0,0,0,0.3); padding:6px 20px; border-radius:22px;
  text-shadow:0 0 8px rgba(255,200,0,0.6);
  pointer-events:none; transition:opacity 1.5s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="title">&#127993; Bow Fun!</div>
  <div id="score">&#11088; 0</div>
</div>
<div id="combo"></div>
<div id="hint">Hold &amp; release to shoot! &#127919;</div>
<script>
const C=document.getElementById('c');
const ctx=C.getContext('2d');
const scoreEl=document.getElementById('score');
const comboEl=document.getElementById('combo');
const hintEl=document.getElementById('hint');

// simple resize — no DPR scaling to avoid black screen on mobile
function resize(){ C.width=innerWidth; C.height=innerHeight; }
resize(); addEventListener('resize',resize);

let score=0,combo=0,comboTimer=0,hintShown=false;
let mx=innerWidth*0.65, my=innerHeight*0.45;
let pulling=false, pullPct=0;
let shakeAmt=0, flashA=0;
const BOW_X=()=>Math.min(118,innerWidth*0.13);
const GND=()=>C.height*0.63;

let animals=[],arrows=[],particles=[],popTexts=[],shockwaves=[];
let lastSpawn=0,spawnDelay=2400,gameT=0;

const bgStars=Array.from({length:65},()=>({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight*0.58,
  vy:-0.28-Math.random()*0.65, sz:0.9+Math.random()*2.8,
  hue:Math.random()*360, twinkle:Math.random()*Math.PI*2, alpha:0.35+Math.random()*0.5
}));

let AC;
function ac(){ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; }
function sfx(freq,type,dur,vol){
  vol=vol||0.25;
  try{
    var a=ac(),o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
function shootSfx(){ sfx(380,'sawtooth',0.08,0.18); setTimeout(function(){sfx(180,'sawtooth',0.12,0.14);},60); }
function hitSfx(){
  var freqs=[650,950,1250];
  freqs.forEach(function(f,i){ setTimeout(function(){sfx(f,'sine',0.17,0.22);},i*48); });
}

function rrect(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function starShape(x,y,sz,col){
  ctx.fillStyle=col; ctx.beginPath();
  for(var i=0;i<5;i++){
    var oa=(i/5)*Math.PI*2-Math.PI/2, ia=oa+Math.PI/5;
    if(i===0) ctx.moveTo(x+Math.cos(oa)*sz,y+Math.sin(oa)*sz);
    else ctx.lineTo(x+Math.cos(oa)*sz,y+Math.sin(oa)*sz);
    ctx.lineTo(x+Math.cos(ia)*sz*0.42,y+Math.sin(ia)*sz*0.42);
  }
  ctx.closePath(); ctx.fill();
}
function rg(x,y,r0,r1,c0,c1){
  var g=ctx.createRadialGradient(x,y,r0,x,y,r1);
  g.addColorStop(0,c0); g.addColorStop(1,c1); return g;
}

var GLOW={bunny:'#FF44DD',duck:'#FFE600',cat:'#FF7700',chicken:'#FF2222',bear:'#FF9900'};

// ── ANIMALS ────────────────────────────────────────────────

  ctx.strokeStyle='#FFB6C1'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(42*s,24*s,13*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=rg(0,30*s,0,36*s,'#ffffff','#FFCCEE');

  ctx.fillStyle=rg(0,-20*s,0,27*s,'#ffffff','#FFD0F0');
  ctx.beginPath(); ctx.ellipse(0,-20*s,30*s,26*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle=rg(-14*s,-62*s,0,30*s,'#fff','#FFDDF5');
  [[-14,-62,-0.15],[14,-62,0.15]].forEach(function(e){
    ctx.beginPath(); ctx.ellipse(e[0]*s,e[1]*s,9*s,30*s,e[2],0,Math.PI*2); ctx.fill(); ctx.stroke();
  });
  ctx.fillStyle='#FF66BB';
  [[-14,-62,-0.15],[14,-62,0.15]].forEach(function(e){
    ctx.beginPath(); ctx.ellipse(e[0]*s,e[1]*s,4.5*s,20*s,e[2],0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='#CC88AA'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,-6*s,8*s,0.25,Math.PI-0.25); ctx.stroke();
  ctx.fillStyle=rg(-22*s,66*s,0,18*s,'#fff','#FFD0F0'); ctx.strokeStyle='#DD99BB'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(-22*s,66*s,13*s,18*s,0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(22*s,66*s,13*s,18*s,-0.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
}

  ctx.fillStyle='#AA4400';

  ctx.fillStyle=rg(0,-24*s,0,34*s,'#FFC044','#FF8800');
  ctx.strokeStyle='#CC5500'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,-24*s,34*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  [[-30,-42,-17,-70,-5,-42],[30,-42,17,-70,5,-42]].forEach(function(e){

  });

  [[-6,-12,-42,-17],[-6,-12,-42,-12],[-6,-12,-42,-7],[6,-12,42,-17],[6,-12,42,-12],[6,-12,42,-7]].forEach(function(w){

}

var DRAWERS={bunny:drawBunny,duck:drawDuck,cat:drawCat,chicken:drawChicken,bear:drawBear};

// ── BOW ───────────────────────────────────────────────────
function drawBow(x,y,angle,pull){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
  var R=62, arc=Math.PI/2.1;
  if(pull>0.2){ ctx.shadowColor='#FF8800'; ctx.shadowBlur=16+pull*22; }
  ctx.strokeStyle='#6B3A2A'; ctx.lineWidth=10; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(0,0,R,-arc,arc); ctx.stroke();
  ctx.strokeStyle='rgba(120,60,20,0.28)'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(0,0,R,-arc+0.1,arc-0.1); ctx.stroke();
  ctx.shadowBlur=0;
  var tx=R*Math.cos(-arc),ty=R*Math.sin(-arc),bx=R*Math.cos(arc),by=R*Math.sin(arc);
  var pullX=-20*pull;
  ctx.strokeStyle='#C8A878'; ctx.lineWidth=3; ctx.lineCap='butt';
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(pullX,0); ctx.lineTo(bx,by); ctx.stroke();
  if(pull>0.05){
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=10;
    ctx.strokeStyle='#8B6914'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(pullX,0); ctx.lineTo(R+24,0); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='#C0C0C0'; ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(R+30,0); ctx.lineTo(R+14,-8); ctx.lineTo(R+14,8); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#E53935';
    ctx.beginPath(); ctx.moveTo(pullX+4,0); ctx.lineTo(pullX-16,-10); ctx.lineTo(pullX-8,0); ctx.fill();
    ctx.beginPath(); ctx.moveTo(pullX+4,0); ctx.lineTo(pullX-16,10); ctx.lineTo(pullX-8,0); ctx.fill();
    ctx.fillStyle='#FFA000';
    ctx.beginPath(); ctx.moveTo(pullX-6,0); ctx.lineTo(pullX-16,0); ctx.lineTo(pullX-10,-5); ctx.fill();
  }
  ctx.restore();
}

// ── BACKGROUND ────────────────────────────────────────────
var cloudX=[200,580,920];
var PETAL_COLS=['#FF69B4','#FF6347','#9370DB','#FFD700','#FF4500','#00CED1','#FF1493','#00FF7F'];
var PCOLS=['#FF6B6B','#FFE66D','#4ECDC4','#FF6B9D','#C7F464','#FFA07A','#FF69B4','#00CED1','#FF00FF','#00FF88'];
var EMOJIS=['⭐','💫','✨','🌟','❤️','💕','🎉','🎊','🔥','💥'];

function drawBG(ts){
  var W=C.width,H=C.height,gnd=GND();
  var hShift=Math.sin(ts*0.00017)*18;
  var sk=ctx.createLinearGradient(0,0,0,gnd);
  sk.addColorStop(0,'hsl('+(228+hShift)+',90%,22%)');
  sk.addColorStop(0.5,'hsl('+(210+hShift)+',100%,42%)');
  sk.addColorStop(1,'hsl('+(194+hShift)+',100%,62%)');
  ctx.fillStyle=sk; ctx.fillRect(0,0,W,gnd);
  // sparkle stars
  bgStars.forEach(function(s){
    s.y+=s.vy; if(s.y<0){s.y=gnd*0.55; s.x=Math.random()*W;}
    s.twinkle+=0.06; s.hue+=0.55;
    var a=s.alpha*(0.5+0.5*Math.sin(s.twinkle));
    ctx.globalAlpha=a;
    ctx.shadowColor='hsl('+(s.hue%360)+',100%,70%)'; ctx.shadowBlur=8;
    ctx.fillStyle='hsl('+(s.hue%360)+',100%,88%)';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.sz,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  });
  // ground
  var gg=ctx.createLinearGradient(0,gnd,0,H);
  gg.addColorStop(0,'#55DD55'); gg.addColorStop(0.35,'#44CC44'); gg.addColorStop(1,'#228822');
  ctx.fillStyle=gg; ctx.fillRect(0,gnd,W,H-gnd);
  // glowing ground line
  ctx.shadowColor='#88FF44'; ctx.shadowBlur=16;
  ctx.strokeStyle='#CCFFAA'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(0,gnd); ctx.lineTo(W,gnd); ctx.stroke();
  ctx.shadowBlur=0;
  // sun
  var sx=W-115,sy=88,sunA=ts*0.00028;
  var sg2=ctx.createRadialGradient(sx,sy,18,sx,sy,95);
  sg2.addColorStop(0,'rgba(255,220,0,0.48)'); sg2.addColorStop(1,'rgba(255,220,0,0)');
  ctx.fillStyle=sg2; ctx.beginPath(); ctx.arc(sx,sy,95,0,Math.PI*2); ctx.fill();
  for(var i=0;i<14;i++){
    var a=sunA+(i/14)*Math.PI*2, h=(i/14)*360;
    ctx.strokeStyle='hsl('+h+',100%,64%)'; ctx.lineWidth=3.5;
    ctx.shadowColor='hsl('+h+',100%,64%)'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(sx+Math.cos(a)*56,sy+Math.sin(a)*56);
    ctx.lineTo(sx+Math.cos(a)*80,sy+Math.sin(a)*80); ctx.stroke();
  }
  ctx.shadowBlur=0;
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(sx,sy,46,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFF9AA'; ctx.beginPath(); ctx.arc(sx-11,sy-11,16,0,Math.PI*2); ctx.fill();
  // clouds
  cloudX=cloudX.map(function(cx,i){var n=cx+(0.19+i*0.09);return n>W+270?-220:n;});
  cloudX.forEach(function(cx,i){drawCloud(cx,[68,42,92][i],[1.1,1.25,0.82][i]);});
  // flowers
  for(var fx=105;fx<W-40;fx+=68) drawFlower(fx,gnd,ts);
  // grass blades
  ctx.strokeStyle='#33BB33'; ctx.lineWidth=2.5;
  for(var gx=82;gx<W-30;gx+=36){
    ctx.beginPath(); ctx.moveTo(gx,gnd); ctx.lineTo(gx-5,gnd-15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx+6,gnd); ctx.lineTo(gx+1,gnd-18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx+12,gnd); ctx.lineTo(gx+17,gnd-13); ctx.stroke();
  }
}

function drawCloud(x,y,sc){
  ctx.save(); ctx.translate(x,y); ctx.scale(sc,sc);
  ctx.shadowColor='rgba(255,255,255,0.35)'; ctx.shadowBlur=14;
  ctx.fillStyle='rgba(255,255,255,0.91)';
  ctx.beginPath();
  ctx.arc(0,0,31,0,Math.PI*2); ctx.arc(37,-11,39,0,Math.PI*2);
  ctx.arc(80,0,29,0,Math.PI*2); ctx.arc(92,14,23,0,Math.PI*2);
  ctx.arc(54,18,33,0,Math.PI*2); ctx.arc(15,17,25,0,Math.PI*2);
  ctx.fill(); ctx.shadowBlur=0; ctx.restore();
}

function drawFlower(x,y,ts){
  var col=PETAL_COLS[Math.floor(x/68)%PETAL_COLS.length];
  var wobble=Math.sin(ts*0.003+x*0.05)*0.14;
  ctx.save(); ctx.translate(x,y); ctx.rotate(wobble);
  ctx.strokeStyle='#33AA33'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,26); ctx.stroke();
  ctx.fillStyle='#44BB44';
  ctx.beginPath(); ctx.moveTo(0,13); ctx.quadraticCurveTo(15,7,13,22); ctx.quadraticCurveTo(0,21,0,13); ctx.fill();
  ctx.shadowColor=col; ctx.shadowBlur=10;
  ctx.fillStyle=col;
  for(var i=0;i<6;i++){
    var a=(i/6)*Math.PI*2;
    ctx.beginPath(); ctx.ellipse(Math.cos(a)*9,Math.sin(a)*9,5.5,7.5,a,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;
  ctx.fillStyle='#FFD700'; ctx.strokeStyle='#CC8800'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,5.5,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function burst(x,y,col){
  for(var i=0;i<22;i++){
    var a=(Math.PI*2/22)*i+Math.random()*0.2, sp=4+Math.random()*7;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.2,
      life:1,col:col||PCOLS[i%PCOLS.length],sz:7+Math.random()*14,
      type:Math.random()>0.38?'star':'circle',g:0.14});
  }
  for(var j=0;j<8;j++){
    particles.push({x:x+(Math.random()-.5)*100,y:y+(Math.random()-.5)*60,
      vx:(Math.random()-.5)*3.5,vy:-5-Math.random()*4,
      life:1,isText:true,text:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
      sz:30+Math.random()*26,g:0.05});
  }
}

function popText(x,y){
  var msgs=['POP!','YAY!','WOW!','NICE!','BOOM!','GREAT!','COOL!','SWEET!'];
  popTexts.push({x:x,y:y,text:msgs[Math.floor(Math.random()*msgs.length)],life:1,vy:-3,sz:52+Math.random()*22});
}

// ── SPAWN ─────────────────────────────────────────────────
function spawnAnimal(){
  var type=TYPES[Math.floor(Math.random()*TYPES.length)];
  var gnd=GND();
  var sc=0.38+Math.random()*0.18;
  var mt=MTYPE[type];
  var baseY=mt==='fly'?gnd-(0.1+Math.random()*0.38)*C.height:gnd;
  animals.push({
    type:type,x:C.width+110,baseY:baseY,currY:baseY,targetY:baseY,
    sc:sc,speed:(1.8+Math.random()*2.2)*(C.width/1100),
    wobble:Math.random()*Math.PI*2,step:0,moveType:mt,
    bhv:mt==='hop'?'hop':mt==='fly'?'glide':'walk',
    bhvTimer:80+Math.random()*80,trailTimer:0
  });
}

function updateBhv(a){
  a.bhvTimer--; if(a.bhvTimer>0) return;
  var r=Math.random(),gnd=GND();
  if(a.moveType==='walk'){
    if(r<0.14){a.bhv='dash';a.bhvTimer=40+Math.random()*28;}
    else if(r<0.26){a.bhv='stop';a.bhvTimer=22+Math.random()*22;}
    else{a.bhv='walk';a.bhvTimer=90+Math.random()*110;}
  } else if(a.moveType==='hop'){
    if(r<0.18){a.bhv='superhop';a.bhvTimer=32;}
    else if(r<0.30){a.bhv='dash';a.bhvTimer=38;}
    else{a.bhv='hop';a.bhvTimer=75+Math.random()*90;}
  } else {
    if(r<0.18){a.bhv='dive';a.targetY=Math.min(gnd-50,a.baseY+120);a.bhvTimer=55;}
    else if(r<0.34){a.bhv='climb';a.targetY=Math.max(55,a.baseY-110);a.bhvTimer=55;}
    else if(r<0.52){a.bhv='zigzag';a.bhvTimer=90;}
    else if(r<0.62){a.bhv='dash';a.bhvTimer=36;}
    else{a.bhv='glide';a.targetY=a.baseY;a.bhvTimer=80+Math.random()*80;}
  }
}

// ── GAME LOOP ─────────────────────────────────────────────
function loop(ts){
  if(!gameT) gameT=ts;
  var elapsed=ts-gameT;
  var W=C.width,H=C.height,gnd=GND();
  var bx=BOW_X();

  ctx.clearRect(0,0,W,H);

  if(shakeAmt>0.5){
    ctx.save();
    ctx.translate((Math.random()-.5)*shakeAmt,(Math.random()-.5)*shakeAmt);
    shakeAmt*=0.76;
  }

  drawBG(ts);

  spawnDelay=Math.max(950,2400-elapsed*0.065);
  if(ts-lastSpawn>spawnDelay){
    spawnAnimal();
    if(elapsed>12000&&Math.random()<0.5) spawnAnimal();
    lastSpawn=ts;
  }

  if(comboTimer>0){ comboTimer--; if(comboTimer<=0){combo=0;} }

  // shockwaves
  shockwaves=shockwaves.filter(function(sw){
    sw.r+=sw.maxR*0.13; sw.alpha*=0.82;
    if(sw.alpha<0.02) return false;
    ctx.beginPath(); ctx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);
    ctx.strokeStyle=sw.col; ctx.lineWidth=3.5;
    ctx.globalAlpha=sw.alpha; ctx.stroke(); ctx.globalAlpha=1;
    return true;
  });

  // animals
  animals=animals.filter(function(a){
    var spd=a.bhv==='stop'?0:a.bhv==='dash'?a.speed*2.1:a.speed;
    a.x-=spd; a.step+=0.075; a.wobble+=0.065;
    updateBhv(a);
    var dy=a.baseY;
    if(a.moveType==='hop'){
      var amp=a.bhv==='superhop'?52:24;
      dy=a.baseY-Math.abs(Math.sin(a.step*2.8))*amp*a.sc;
    } else if(a.moveType==='fly'){
      a.currY+=(a.targetY-a.currY)*0.045;
      if(a.bhv==='zigzag'&&Math.sin(a.step*3)>0.9){
        a.targetY=Math.max(55,Math.min(gnd-50,a.baseY+(Math.random()-.5)*160));
      }
      dy=a.currY+Math.sin(a.step*2.2)*11;
    }
    if(a.x<-160) return false;
    a.trailTimer++;
    if(a.trailTimer%3===0&&Math.random()<0.65){
      particles.push({
        x:a.x+(Math.random()-.5)*28*a.sc,y:dy+(Math.random()-.5)*28*a.sc,
        vx:(Math.random()-.5)*2,vy:-1.1-Math.random()*1.5,
        life:0.65+Math.random()*0.3,col:GLOW[a.type],sz:2.5+Math.random()*5.5,type:'dot',g:0.02
      });
    }
    ctx.save(); ctx.translate(a.x,dy); ctx.scale(-1,1);
    DRAWERS[a.type](a.sc);
    ctx.restore();
    return true;
  });

  // arrows
  arrows=arrows.filter(function(ar){
    ar.x+=ar.vx; ar.y+=ar.vy; ar.vy+=0.23;
    ar.angle=Math.atan2(ar.vy,ar.vx);
    if(ar.x<-80||ar.x>W+80||ar.y>H+80) return false;
    for(var i=animals.length-1;i>=0;i--){
      var a=animals[i];
      var ay=a.baseY;
      if(a.moveType==='hop') ay=a.baseY-Math.abs(Math.sin(a.step*2.8))*(a.bhv==='superhop'?52:24)*a.sc;
      else if(a.moveType==='fly') ay=a.currY+Math.sin(a.step*2.2)*11;
      if(Math.hypot(ar.x-a.x,ar.y-ay)<50*a.sc){
        burst(a.x,ay,GLOW[a.type]);
        popText(a.x,ay-72*a.sc);
        shockwaves.push({x:a.x,y:ay,r:8,maxR:88,alpha:0.9,col:GLOW[a.type]});
        shockwaves.push({x:a.x,y:ay,r:8,maxR:55,alpha:0.55,col:'#ffffff'});
        animals.splice(i,1);
        score++; scoreEl.textContent='⭐ '+score;
        scoreEl.className=''; void scoreEl.offsetWidth; scoreEl.className='pop';
        hitSfx(); shakeAmt=10; flashA=0.5;
        combo++; comboTimer=130;
        if(combo>1){
          comboEl.textContent='🔥 COMBO x'+combo+'!';
          comboEl.className=''; void comboEl.offsetWidth; comboEl.className='show';
        }
        if(!hintShown){hintEl.style.opacity='0';hintShown=true;}
        return false;
      }
    }
    drawArrow(ar.x,ar.y,ar.angle);
    return true;
  });

  // particles
  particles=particles.filter(function(p){
    p.life-=0.018; p.x+=p.vx; p.y+=p.vy; p.vy+=p.g||0.1; p.vx*=0.97;
    if(p.life<=0) return false;
    ctx.globalAlpha=p.life;
    if(p.isText){
      ctx.font='bold '+p.sz+'px Arial'; ctx.textAlign='center';
      ctx.fillStyle='#FFD700'; ctx.strokeStyle='#333'; ctx.lineWidth=3;
      ctx.strokeText(p.text,p.x,p.y); ctx.fillText(p.text,p.x,p.y);
    } else if(p.type==='star'){
      starShape(p.x,p.y,p.sz,p.col);
    } else if(p.type==='dot'){
      ctx.shadowColor=p.col; ctx.shadowBlur=7;
      ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    } else {
      ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    return true;
  });

  // pop texts
  popTexts=popTexts.filter(function(t){
    t.y+=t.vy; t.life-=0.02;
    if(t.life<=0) return false;
    ctx.globalAlpha=t.life;
    ctx.font='bold '+t.sz+'px "Arial Rounded MT Bold",Arial';
    ctx.textAlign='center';
    ctx.fillStyle='hsl('+(ts/7%360)+',100%,58%)';
    ctx.strokeStyle='#fff'; ctx.lineWidth=7;
    ctx.strokeText(t.text,t.x,t.y); ctx.fillText(t.text,t.x,t.y);
    ctx.globalAlpha=1;
    return true;
  });

  // aim guide
  if(animals.length>0){
    ctx.globalAlpha=0.22; ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.5;
    ctx.setLineDash([12,9]);
    ctx.beginPath(); ctx.moveTo(bx,gnd); ctx.lineTo(mx,my); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
    ctx.globalAlpha=0.4; ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(mx,my,19,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }

  if(pulling&&pullPct<1) pullPct=Math.min(1,pullPct+0.065);

  drawKid(bx,gnd);
  drawBow(bx,gnd,Math.atan2(my-gnd,mx-bx),pulling?pullPct:0.22);

  if(shakeAmt>0.5) ctx.restore();

  if(flashA>0.01){ ctx.fillStyle='rgba(255,255,255,'+flashA+')'; ctx.fillRect(0,0,W,H); flashA*=0.72; }

  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────
function aim(x,y){mx=x;my=y;}
function shoot(){
  var gnd=GND(),bx=BOW_X(),ang=Math.atan2(my-gnd,mx-bx),sp=16;
  arrows.push({x:bx,y:gnd,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,angle:ang});
  shootSfx(); pulling=false; pullPct=0;
}
C.addEventListener('mousemove',function(e){var r=C.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top);});
C.addEventListener('mousedown',function(e){var r=C.getBoundingClientRect();aim(e.clientX-r.left,e.clientY-r.top);pulling=true;pullPct=0;});
C.addEventListener('mouseup',function(){if(pulling)shoot();});
C.addEventListener('touchmove',function(e){e.preventDefault();var r=C.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
C.addEventListener('touchstart',function(e){e.preventDefault();var r=C.getBoundingClientRect();aim(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);pulling=true;pullPct=0;},{passive:false});
C.addEventListener('touchend',function(e){e.preventDefault();if(pulling)shoot();},{passive:false});

setTimeout(function(){if(!hintShown)hintEl.style.opacity='0';},6000);
requestAnimationFrame(loop);
</script>
